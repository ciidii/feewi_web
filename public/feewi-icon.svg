<svg width="88" height="88" viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="88" height="88" rx="20" fill="url(#iconBg)"/>
  <rect x="1" y="1" width="86" height="86" rx="19" stroke="url(#iconBorder)" stroke-width="1.5"/>

  <!-- F stylisé -->
  <rect x="22" y="16" width="6" height="52" rx="3" fill="white"/>
  <rect x="22" y="16" width="38" height="6" rx="3" fill="url(#goldG_icon)"/>
  <rect x="22" y="37" width="26" height="5" rx="2.5" fill="url(#blueG_icon)"/>
  <circle cx="64" cy="60" r="5" fill="url(#goldG_icon)"/>
  <line x1="60" y1="57" x2="52" y2="50" stroke="url(#goldG_icon)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>

  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#002f68"/>
      <stop offset="100%" stop-color="#001945"/>
    </linearGradient>
    <linearGradient id="iconBorder" x1="0" y1="0" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5484ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5484ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="goldG_icon" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#E8C05A"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="blueG_icon" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5484ff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
