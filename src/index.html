<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>feewi : votre établissement en ordre</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="feewi-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
<app-root>
  <!-- Loader Pré-Bootstrap (Miroir de fw-splash-screen) -->
  <style>
    .feewi-preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #f8fafc; /* Correspond à var(--fw-surface-page) */
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lexend', sans-serif;
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    .logo-wrapper {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo-icon {
      width: 100%;
      height: auto;
      animation: fw-logo-float 3s infinite ease-in-out;
    }

    .status-zone {
      text-align: center;
      width: 220px;
    }

    .status-text {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #94a3b8; /* Correspond à var(--fw-text-tertiary) */
      margin-bottom: 1.25rem;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: #f1f5f9; /* Correspond à var(--fw-surface-sunken) */
      border-radius: 9999px;
      overflow: hidden;
    }

    .progress-bar {
      width: 100%;
      height: 100%;
      background: #0052FF; /* Feewi Primary */
      transform-origin: left;
      animation: fw-progress-indet 1.5s infinite cubic-bezier(0.65, 0.815, 0.735, 0.395);
    }

    @keyframes fw-logo-float {
      0% { transform: translateY(0) scale(1); filter: drop-shadow(0 5px 15px rgba(0, 82, 255, 0.1)); }
      50% { transform: translateY(-6px) scale(1.02); filter: drop-shadow(0 20px 25px rgba(0, 82, 255, 0.2)); }
      100% { transform: translateY(0) scale(1); filter: drop-shadow(0 5px 15px rgba(0, 82, 255, 0.1)); }
    }

    @keyframes fw-progress-indet {
      0% { transform: translateX(-100%) scaleX(0.2); }
      50% { transform: translateX(0%) scaleX(0.5); }
      100% { transform: translateX(100%) scaleX(0.2); }
    }
  </style>

  <div class="feewi-preloader">
    <div class="splash-content">
      <div class="logo-wrapper">
        <img src="feewi-icon.svg" alt="Feewi" class="logo-icon">
      </div>
      <div class="status-zone">
        <p class="status-text">Initialisation de Feewi</p>
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>
  </div>
</app-root>
</body>
</html>
