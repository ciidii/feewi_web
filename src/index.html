<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>feewi : votre établissement en ordre</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="feewi-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
<app-root>
  <!-- Loader Pré-Bootstrap (Premium) -->
  <style>
    .feewi-preloader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      font-family: 'Lexend', sans-serif;
    }
    .feewi-preloader .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #f0f0f0;
      border-top: 3px solid #0052FF;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      margin-bottom: 20px;
    }
    .feewi-preloader .logo-text {
      font-weight: 700;
      font-size: 1.25rem;
      color: #1a1a1a;
      letter-spacing: -0.03em;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <div class="feewi-preloader">
    <div class="spinner"></div>
    <div class="logo-text">Feewi.</div>
  </div>
</app-root>
</body>
</html>
