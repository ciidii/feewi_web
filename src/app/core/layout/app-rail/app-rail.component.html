<nav class="w-16 h-[calc(100vh-64px)] bg-slate-50 border-r border-border-subtle flex flex-col items-center py-4 gap-2 transition-all select-none">
  
  <!-- === MONDE 1 : SAAS SYSTEM ADMIN (Uniquement ROLE_SUPER_ADMIN) === -->
  <ng-container *ngIf="auth.currentUser()?.roles?.includes('ROLE_SUPER_ADMIN')">
    <a 
      (click)="onSelectService('saas')" 
      routerLink="/saas/tenants"
      class="rail-link group saas-link" 
      [class.active]="navService.activeService() === 'saas'"
      title="Administration SaaS"
    >
      <div class="active-indicator bg-amber-500"></div>
      <lucide-icon [name]="Building2" class="w-5 h-5 text-amber-600"></lucide-icon>
      <span class="rail-label text-amber-700">SaaS</span>
    </a>
  </ng-container>

  <!-- === MONDE 2 : SCHOOL APP (Sélecteur de Service) === -->
  <ng-container *ngIf="!auth.currentUser()?.roles?.includes('ROLE_SUPER_ADMIN')">
    <!-- Dashboard Service -->
    <a 
      (click)="onSelectService('dashboard')" 
      routerLink="/dashboard"
      class="rail-link group" 
      [class.active]="navService.activeService() === 'dashboard'"
      title="Tableau de bord"
    >
      <div class="active-indicator"></div>
      <lucide-icon [name]="Home" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Home</span>
    </a>

    <!-- Enrollment Service -->
    <a 
      (click)="onSelectService('enrollment')" 
      routerLink="/admissions"
      class="rail-link group" 
      [class.active]="navService.activeService() === 'enrollment'"
      title="Enrollment Service"
    >
      <div class="active-indicator"></div>
      <lucide-icon [name]="Briefcase" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Insc.</span>
    </a>

    <!-- Student Registry Service -->
    <a 
      (click)="onSelectService('registry')" 
      routerLink="/students"
      class="rail-link group" 
      [class.active]="navService.activeService() === 'registry'"
      title="Student Registry"
    >
      <div class="active-indicator"></div>
      <lucide-icon [name]="Users" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Élèves</span>
    </a>

    <!-- Academic Structure Service -->
    <a 
      (click)="onSelectService('academic')" 
      routerLink="/classes"
      class="rail-link group" 
      [class.active]="navService.activeService() === 'academic'"
      title="Academic Structure"
    >
      <div class="active-indicator"></div>
      <lucide-icon [name]="School" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Acad.</span>
    </a>

    <!-- Identity Service -->
    <a 
      (click)="onSelectService('identity')" 
      routerLink="/identity/staff"
      class="rail-link group" 
      [class.active]="navService.activeService() === 'identity'"
      title="Identity & Security"
    >
      <div class="active-indicator"></div>
      <lucide-icon [name]="ShieldCheck" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Secu.</span>
    </a>
  </ng-container>

  <!-- Bottom: Settings -->
  <div class="mt-auto">
    <a (click)="onSelectService('settings')" class="rail-link group" [class.active]="navService.activeService() === 'settings'" title="Paramètres">
      <lucide-icon [name]="Settings" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Réglages</span>
    </a>
  </div>
</nav>
