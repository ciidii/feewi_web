<nav class="w-16 h-[calc(100vh-64px)] bg-slate-50 border-r border-border-subtle flex flex-col items-center py-4 gap-2 transition-all select-none">
  
  <!-- === MONDE 1 : SAAS SYSTEM ADMIN (Uniquement ROLE_SUPER_ADMIN) === -->
  <ng-container *ngIf="auth.currentUser()?.roles?.includes('ROLE_SUPER_ADMIN')">
    <a routerLink="/saas/tenants" routerLinkActive="active" class="rail-link group saas-link" title="Établissements">
      <div class="active-indicator bg-amber-500"></div>
      <lucide-icon [name]="Building2" class="w-5 h-5 text-amber-600"></lucide-icon>
      <span class="rail-label text-amber-700">Tenants</span>
    </a>

    <a routerLink="/saas/stats" routerLinkActive="active" class="rail-link group saas-link" title="Statistiques">
      <div class="active-indicator bg-amber-500"></div>
      <lucide-icon [name]="BarChart3" class="w-5 h-5 text-amber-600"></lucide-icon>
      <span class="rail-label text-amber-700">Stats</span>
    </a>

    <a routerLink="/saas/audit" routerLinkActive="active" class="rail-link group saas-link" title="Audit Système">
      <div class="active-indicator bg-amber-500"></div>
      <lucide-icon [name]="Shield" class="w-5 h-5 text-amber-600"></lucide-icon>
      <span class="rail-label text-amber-700">Sécurité</span>
    </a>
  </ng-container>

  <!-- === MONDE 2 : SCHOOL APP (Pour tous les autres rôles, SAUF ROLE_SUPER_ADMIN) === -->
  <ng-container *ngIf="!auth.currentUser()?.roles?.includes('ROLE_SUPER_ADMIN')">
    <a routerLink="/dashboard" routerLinkActive="active" class="rail-link group" title="Tableau de bord">
      <div class="active-indicator"></div>
      <lucide-icon [name]="Home" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Accueil</span>
    </a>

    <a routerLink="/admissions" routerLinkActive="active" class="rail-link group" title="Admissions">
      <div class="active-indicator"></div>
      <lucide-icon [name]="Briefcase" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Inscrits</span>
    </a>

    <a routerLink="/students" routerLinkActive="active" class="rail-link group" title="Scolarité">
      <div class="active-indicator"></div>
      <lucide-icon [name]="GraduationCap" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Scolarité</span>
    </a>
  </ng-container>

  <!-- Bottom: Settings (Commun mais contextuel) -->
  <div class="mt-auto">
    <a class="rail-link group" title="Paramètres">
      <lucide-icon [name]="Settings" class="w-5 h-5"></lucide-icon>
      <span class="rail-label">Réglages</span>
    </a>
  </div>
</nav>
