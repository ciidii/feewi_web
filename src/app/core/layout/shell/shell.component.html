<div class="shell-layout selection:bg-primary selection:text-white antialiased">
  
  <!-- Header Supérieur (Global Services) -->
  <app-header></app-header>

  <div class="shell-body">
    <!-- Rail de Navigation (Extrême Gauche) -->
    <app-rail></app-rail>

    <!-- Sidebar du Module (Collapsible) -->
    <app-sidebar></app-sidebar>

    <!-- Zone de Contenu Principale -->
    <main class="shell-main relative">
      <!-- Page Loader (Niveau 3) : Uniquement en contexte 'page' -->
      <fw-page-progress *ngIf="loadingService.isLoading() && loadingService.context() === 'page'"></fw-page-progress>
      
      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
