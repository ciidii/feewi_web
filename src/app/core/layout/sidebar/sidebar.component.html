<aside
  class="sidebar-container"
  [class.is-expanded]="navService.isSidebarExpanded()"
  [class.is-collapsed]="!navService.isSidebarExpanded()"
>

  <!-- === CONSOLE SAAS === -->
  <ng-container *ngIf="auth.currentUser()?.roles?.includes('ROLE_SUPER_ADMIN')">
    <div class="saas-badge">
      <div class="inner">
        <lucide-icon [name]="ShieldCheck" [size]="20"></lucide-icon>
        <span class="label">Console Système</span>
      </div>
    </div>

    <nav class="nav-scroll">
      <a *ngFor="let item of saasItems"
         [routerLink]="item.route"
         routerLinkActive="active-link"
         class="sidebar-link">
        <div class="icon-wrap"><lucide-icon [name]="item.icon" [size]="16"></lucide-icon></div>
        <span class="label">{{ item.label }}</span>
      </a>
    </nav>
  </ng-container>

  <!-- === SCHOOL APP NAVIGATION === -->
  <ng-container *ngIf="!auth.currentUser()?.roles?.includes('ROLE_SUPER_ADMIN')">

    <nav class="nav-scroll">
      <!-- DASHBOARD -->
      <ng-container *ngIf="navService.activeService() === 'dashboard'">
        <span class="nav-section-title">Analyse Pilotage</span>
        <a routerLink="/admin/dashboard" routerLinkActive="active-link" class="sidebar-link">
          <div class="icon-wrap"><lucide-icon [name]="BarChart3" [size]="16"></lucide-icon></div>
          <span class="label">Vue d'ensemble</span>
        </a>
      </ng-container>

      <!-- ENROLLMENT -->
      <ng-container *ngIf="navService.activeService() === 'enrollment'">
        <span class="nav-section-title">Inscriptions</span>
        <a *ngFor="let item of enrollmentItems"
           [routerLink]="item.route"
           routerLinkActive="active-link"
           class="sidebar-link">
          <div class="icon-wrap"><lucide-icon [name]="item.icon" [size]="16"></lucide-icon></div>
          <span class="label">{{ item.label }}</span>
        </a>
      </ng-container>

      <!-- REGISTRY -->
      <ng-container *ngIf="navService.activeService() === 'registry'">
        <span class="nav-section-title">Registre Élèves</span>
        <a *ngFor="let item of registryItems"
           [routerLink]="item.route"
           routerLinkActive="active-link"
           class="sidebar-link">
          <div class="icon-wrap"><lucide-icon [name]="item.icon" [size]="16"></lucide-icon></div>
          <span class="label">{{ item.label }}</span>
        </a>
      </ng-container>

      <!-- ACADEMIC -->
      <ng-container *ngIf="navService.activeService() === 'academic'">
        <span class="nav-section-title">Pilotage</span>
        <a *ngFor="let item of academicItems"
           [routerLink]="item.route"
           routerLinkActive="active-link"
           class="sidebar-link">
          <div class="icon-wrap"><lucide-icon [name]="item.icon" [size]="16"></lucide-icon></div>
          <span class="label">{{ item.label }}</span>
        </a>
      </ng-container>

      <!-- IDENTITY -->
      <ng-container *ngIf="navService.activeService() === 'identity'">
        <span class="nav-section-title">Sécurité & Staff</span>
        <a *ngFor="let item of identityItems"
           [routerLink]="item.route"
           routerLinkActive="active-link"
           class="sidebar-link">
          <div class="icon-wrap"><lucide-icon [name]="item.icon" [size]="16"></lucide-icon></div>
          <span class="label">{{ item.label }}</span>
        </a>
      </ng-container>

    </nav>
  </ng-container>

  <!-- FOOTER TOGGLE -->
  <footer class="sidebar-footer">
    <button class="toggle-btn" (click)="navService.toggleSidebar()">
      <lucide-icon [name]="navService.isSidebarExpanded() ? ChevronLeft : ChevronRight" [size]="14"></lucide-icon>
    </button>
  </footer>

</aside>
