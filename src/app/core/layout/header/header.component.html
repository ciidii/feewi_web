<header class="global-header">
  
  <div class="header-left">
    <!-- Espace r├®serv├® pour l'├®quilibre visuel -->
  </div>

  <!-- Center: Omnisearch -->
  <div class="search-section">
    <div class="search-input-wrap">
      <lucide-icon [name]="Search" [size]="14" class="search-icon"></lucide-icon>
      <input 
        type="text" 
        class="fw-search-input" 
        [placeholder]="contextService.isSaasDomain() ? 'Rechercher un établissement...' : 'Rechercher élève, dossier, staff...'"
      />
      <div class="search-kbd">
        <kbd>⌘</kbd><kbd>K</kbd>
      </div>
    </div>
  </div>

  <!-- Right: Notifications & Quick Actions -->
  <div class="actions-section">
    
    <!-- Year Selector -->
    <button *ngIf="!contextService.isSaasDomain()" class="year-selector" title="Changer d'année scolaire">
      <span class="label">2024 - 2025</span>
      <lucide-icon [name]="ChevronDown" [size]="12" class="opacity-50"></lucide-icon>
    </button>

    <!-- Test Loader -->
    <button class="header-btn" (click)="testLoader()" title="Tester le Loader">
      <lucide-icon [name]="Search" [size]="16" class="text-primary/50"></lucide-icon>
    </button>

    <div class="v-divider"></div>

    <!-- Notifications -->
    <button class="header-btn notification-trigger" title="Centre de notifications">
      <lucide-icon [name]="Bell" [size]="16"></lucide-icon>
      <span class="notification-pulse"></span>
    </button>
  </div>

</header>
