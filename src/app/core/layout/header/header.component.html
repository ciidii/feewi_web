<header class="global-header">
  
  <!-- Left: Service Context (Optional - Can be used for page titles or left empty for zen) -->
  <div class="header-left">
    <!-- Vide pour l'instant pour laisser respirer la Sidebar -->
  </div>

  <!-- Center: Omnisearch (La pi├¿ce ma├«tresse) -->
  <div class="search-section">
    <div class="search-input-wrap">
      <lucide-icon [name]="Search" [size]="14" class="search-icon"></lucide-icon>
      <input 
        type="text" 
        class="fw-search-input" 
        [placeholder]="contextService.isSaasDomain() ? 'Rechercher un établissement...' : 'Rechercher élève, dossier, staff...'"
      />
      <div class="search-kbd">
        <kbd>⌘</kbd><kbd>K</kbd>
      </div>
    </div>
  </div>

  <!-- Right: Global Actions -->
  <div class="actions-section">
    
    <!-- Year Selector (Premium Pill) -->
    <button *ngIf="!contextService.isSaasDomain()" class="year-selector">
      <span class="label">2024 - 2025</span>
      <lucide-icon [name]="ChevronDown" [size]="12" class="opacity-50"></lucide-icon>
    </button>

    <div class="v-divider" *ngIf="!contextService.isSaasDomain()"></div>

    <!-- Test Loader -->
    <button class="header-btn" (click)="testLoader()" title="Tester le Loader">
      <lucide-icon [name]="Search" [size]="16" class="animate-pulse text-primary"></lucide-icon>
    </button>

    <!-- Notifications -->
    <button class="header-btn" title="Notifications">
      <lucide-icon [name]="Bell" [size]="16"></lucide-icon>
      <span class="notification-dot"></span>
    </button>

    <div class="v-divider"></div>

    <!-- Profile (Elite Style) -->
    <div class="profile-trigger" (click)="openProfileDialog()">
      <div class="avatar-box">
        <lucide-icon [name]="User" [size]="14"></lucide-icon>
      </div>
      <span class="user-name hidden lg:block">{{ auth.currentUser()?.firstName }}</span>
    </div>

    <!-- Logout -->
    <button class="header-btn logout-btn" (click)="auth.logout()" title="Déconnexion">
      <lucide-icon [name]="LogOut" [size]="16"></lucide-icon>
    </button>
  </div>

</header>
