<div class="fw-data-table-container">
  <!-- Header / Toolbar -->
  <div class="table-toolbar">
    <div class="tabs-group">
      <button
        *ngFor="let tab of tabs()"
        (click)="onTabChange.emit(tab)"
        class="tab-btn"
        [class.active]="activeTab() === tab"
      >
        {{ tab }}
      </button>
    </div>

    <div class="search-field" *ngIf="showSearch()">
      <lucide-icon [name]="Search" class="search-icon"></lucide-icon>
      <input type="text" placeholder="Rechercher par nom, dossier..." class="search-input" />
    </div>
  </div>

  <!-- Body / Row List -->
  <div class="table-body">
    <div
      *ngFor="let row of data()"
      class="row-item"
      (click)="onView.emit(row)"
    >
      <!-- Leading section (Select & Avatar) -->
      <div class="leading-col" (click)="$event.stopPropagation()">
        <mat-checkbox color="primary" class="checkbox-col"></mat-checkbox>
        <div class="avatar-box">
          <img *ngIf="row.avatarUrl" [src]="row.avatarUrl" [alt]="row.title" />
          <span *ngIf="!row.avatarUrl">{{ row.avatarLabel || row.title.charAt(0) }}</span>
        </div>
      </div>

      <!-- Main content section -->
      <div class="main-col">
        <div class="title-line">
          <span class="row-title">{{ row.title }}</span>
          <span class="row-subtitle">{{ row.subtitle }}</span>
        </div>
        <div class="badge-line">
          <span
            *ngFor="let badge of row.badges"
            class="badge {{ badge.class }}"
          >
            {{ badge.label }}
          </span>
        </div>
      </div>

      <!-- Meta section (Date) -->
      <div class="meta-col">
        {{ row.date }}
      </div>

      <!-- Hover Actions section (Overlay) -->
      <div class="actions-overlay" (click)="$event.stopPropagation()">
        <button class="icon-btn" (click)="onView.emit(row)" title="Voir les détails">
          <lucide-icon [name]="Eye" class="icon-sm"></lucide-icon>
        </button>
        <button class="icon-btn btn-success" (click)="onValidate.emit(row)" title="Valider l'inscription">
          <lucide-icon [name]="CheckCircle" class="icon-sm"></lucide-icon>
        </button>
        <button class="icon-btn" (click)="onPrint.emit(row)" title="Imprimer le reçu">
          <lucide-icon [name]="Printer" class="icon-sm"></lucide-icon>
        </button>
        <button class="icon-btn" title="Plus d'options">
          <lucide-icon [name]="MoreHorizontal" class="icon-sm"></lucide-icon>
        </button>
      </div>
    </div>

    <!-- Empty state -->
    <div *ngIf="data().length === 0" class="empty-state">
      <div class="empty-icon-box">
        <lucide-icon [name]="Search" class="icon-xl"></lucide-icon>
      </div>
      <p>Aucun résultat ne correspond à votre recherche.</p>
    </div>
  </div>

  <!-- Footer / Pagination -->
  <div class="table-footer">
    <div class="footer-info">
      Affichage de 1 à {{ data().length }} sur <strong>{{ total() }}</strong> dossiers
    </div>
    <div class="footer-nav">
      <button class="nav-button" disabled>Précédent</button>
      <button class="nav-button">Suivant</button>
    </div>
  </div>
</div>
