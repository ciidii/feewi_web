<div *ngIf="isLoading()" class="loader-overlay" [class.fullscreen]="fullscreen()">
  <div class="loader-container">
    <div class="loader-visual" aria-hidden="true">
      <div class="loader-ring"></div>
      <div class="loader-core">
        <lucide-icon [name]="Loader2" class="loader-icon"></lucide-icon>
      </div>
      <span class="loader-dot"></span>
    </div>
    <p class="loader-text">{{ message() || 'Chargement en cours...' }}</p>
  </div>
</div>
