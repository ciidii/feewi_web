<div *ngIf="isLoading()" class="loader-overlay" [class.fullscreen]="fullscreen()">
  <div class="loader-container">
    <div class="loader-visual" [class.is-slow]="isSlow()" aria-hidden="true">
      <div class="loader-ring"></div>
      <div class="loader-core">
        <lucide-icon [name]="Loader2" class="loader-icon"></lucide-icon>
      </div>
      <span class="loader-dot"></span>
    </div>
    <p class="loader-text">{{ message() || 'Chargement en cours...' }}</p>

    <!-- Option de secours si trop lent -->
    <div *ngIf="isSlow()" class="loader-slow-action animate-in fade-in slide-in-from-bottom-2 duration-500">
      <p class="loader-subtext">Le serveur met plus de temps que prévu à répondre.</p>
      <button (click)="refresh()" class="loader-retry-btn">
        <lucide-icon [name]="RefreshCcw" class="w-3.5 h-3.5"></lucide-icon>
        Réactualiser la page
      </button>
    </div>
  </div>
</div>
