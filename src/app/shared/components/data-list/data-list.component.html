<div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col transition-all hover:shadow-md">

  <!-- ======================================= -->
  <!-- TOOLBAR (Tabs + Sélecteur de vues + Recherche) -->
  <!-- ======================================= -->
  <div class="flex items-center justify-between border-b border-slate-100 bg-white px-6 h-14">

    <!-- Mode Sélection (quand des éléments sont sélectionnés) -->
    <div *ngIf="selectionState().count > 0" class="flex items-center gap-4 animate-in slide-in-from-left">
      <!-- Compteur de sélection -->
      <div class="flex items-center gap-3 bg-primary-50/50 px-3 py-1.5 rounded-xl">
        <span class="text-sm font-semibold text-primary-700">
          {{ selectionState().count }} sélectionné(s)
        </span>
        <button
          (click)="clearSelection()"
          class="w-6 h-6 rounded-full hover:bg-primary-100 flex items-center justify-center"
          title="Effacer la sélection"
        >
          <lucide-icon [name]="X" class="w-3.5 h-3.5 text-primary-600"></lucide-icon>
        </button>
      </div>

      <!-- Séparateur -->
      <div class="h-5 w-px bg-slate-200"></div>

      <!-- Actions groupées -->
      <div class="flex items-center gap-1">
        <button
          (click)="onBulkValidate.emit(getSelectedIdsArray())"
          class="action-button validate"
          title="Valider la sélection"
        >
          <lucide-icon [name]="CheckCircle" class="w-4 h-4"></lucide-icon>
        </button>
        <button class="action-button archive" title="Archiver">
          <lucide-icon [name]="Archive" class="w-4 h-4"></lucide-icon>
        </button>
        <button class="action-button delete" title="Supprimer">
          <lucide-icon [name]="Trash2" class="w-4 h-4"></lucide-icon>
        </button>
        <button class="action-button export" title="Exporter">
          <lucide-icon [name]="Download" class="w-4 h-4"></lucide-icon>
        </button>
      </div>
    </div>

    <!-- Mode Normal (pas de sélection) -->
    <div *ngIf="selectionState().count === 0" class="flex items-center gap-4 flex-1">
      <!-- Checkbox "Tout sélectionner" -->
      <mat-checkbox
        color="primary"
        [checked]="selectionState().isAllSelected"
        [indeterminate]="selectionState().isPartiallySelected"
        (change)="toggleAll()"
        class="select-checkbox"
        title="Tout sélectionner"
      ></mat-checkbox>

      <!-- Onglets -->
      <nav class="flex gap-1" role="tablist">
        <button
          *ngFor="let tab of tabs()"
          (click)="onTabChange.emit(tab.label)"
          role="tab"
          [attr.aria-selected]="activeTab() === tab.label"
          class="tab-button"
          [class.active]="activeTab() === tab.label"
        >
          <lucide-icon *ngIf="tab.icon" [name]="tab.icon" class="w-4 h-4"></lucide-icon>
          <span>{{ tab.label }}</span>
          <span *ngIf="tab.count" class="badge" [class.active]="activeTab() === tab.label">
            {{ tab.count }}
          </span>
        </button>
      </nav>

      <!-- Zone droite (sélecteur de vues + recherche) -->
      <div class="ml-auto flex items-center gap-3">

        <div class="view-switcher">
          <button
            [matMenuTriggerFor]="viewMenu"
            class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-medium transition-colors"
          >
            <lucide-icon [name]="getCurrentViewIcon()" class="w-4 h-4 text-primary-600"></lucide-icon>
            <span class="hidden sm:inline">{{ getCurrentViewLabel() }}</span>
            <lucide-icon [name]="ChevronDown" class="w-3.5 h-3.5 text-slate-500"></lucide-icon>
          </button>
          <mat-menu #viewMenu="matMenu" class="view-menu" xPosition="before" yPosition="below">
            <!-- En-tête -->
            <div class="menu-header">
              <lucide-icon [name]="LayoutGrid" class="w-3.5 h-3.5"></lucide-icon>
              <span>Changer l'affichage</span>
            </div>

            <!-- Options de vues -->
            <button
              *ngFor="let view of availableViews()"
              mat-menu-item
              (click)="setViewMode(view.id)"
              class="view-menu-item"
              [class.active]="viewMode() === view.id"
            >
              <div class="menu-item-content">
                <div class="menu-item-left">
                  <lucide-icon [name]="view.icon" class="w-5 h-5" [class.text-primary-600]="viewMode() === view.id"></lucide-icon>
                </div>

                <div class="menu-item-center">
                  <div class="menu-item-title">
                    <span>{{ view.label }}</span>
                    <span *ngIf="isNewView(view.id)" class="new-badge">Nouveau</span>
                  </div>
                  <div class="menu-item-description">{{ view.description }}</div>
                </div>

                <!-- Checkmark pour la vue active -->
                <div class="menu-item-right" *ngIf="viewMode() === view.id">
                  <lucide-icon [name]="Check" class="w-4 h-4 text-primary-600"></lucide-icon>
                </div>
              </div>
            </button>

            <!-- Footer -->
            <div class="menu-footer">
              <lucide-icon [name]="Sparkles" class="w-3.5 h-3.5"></lucide-icon>
              <span>Préférence sauvegardée automatiquement</span>
            </div>
          </mat-menu>
        </div>

        <!-- RECHERCHE -->
        <div class="relative" *ngIf="showSearch()">
          <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
            <lucide-icon [name]="Search" class="w-4 h-4"></lucide-icon>
          </div>
          <input
            type="text"
            [ngModel]="searchQuery()"
            (ngModelChange)="updateSearch($event)"
            placeholder="Rechercher..."
            class="search-input"
            [class.has-value]="searchState().isActive"
          />
          <button
            *ngIf="searchState().isActive"
            (click)="clearSearch()"
            class="search-clear"
            aria-label="Effacer la recherche"
          >
            <lucide-icon [name]="X" class="w-3.5 h-3.5"></lucide-icon>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ======================================= -->
  <!-- ZONE DE CONTENU DYNAMIQUE (selon la vue) -->
  <!-- ======================================= -->
  <!-- ======================================= -->
  <!-- ZONE DE CONTENU DYNAMIQUE (selon la vue) -->
  <!-- ======================================= --<!-- VUE TABLEAU (à venir) -->
  <div class="relative min-h-[200px]">

    <!-- Loader Overlay -->
    <div *ngIf="isLoading()" class="absolute inset-0 z-50 bg-white/60 backdrop-blur-[1px] flex items-center justify-center rounded-xl animate-in fade-in duration-300">
      <div class="flex flex-col items-center gap-3">
        <div class="relative">
          <lucide-icon [name]="Sparkles" [size]="32" class="text-primary-600 animate-spin"></lucide-icon>
          <div class="absolute inset-0 blur-xl bg-primary-400/20 animate-pulse"></div>
        </div>
        <p class="text-sm font-medium text-slate-600">Mise à jour des données...</p>
      </div>
    </div>

    <!-- VUE EXTENSIBLE -->
    <app-expandable-view
      *ngIf="viewMode() === 'expandable'"
      [data]="displayedData()"
      [selectedIds]="selectedIds()"
      [expandedIds]="expandedIds()"
      [getBadgeClass]="getBadgeClass"
      [actions]="actions()"
      (toggleRow)="toggleRow($event)"
      (toggleExpand)="toggleExpand($event)"
      (onAction)="onAction.emit($event)"
      (onRowClick)="handleRowClick($event)"
    ></app-expandable-view>

    <!-- VUE CARTES -->
    <app-cards-view
      *ngIf="viewMode() === 'cards'"
      [data]="displayedData()"
      [selectedIds]="selectedIds()"
      [getBadgeClass]="getBadgeClass"
      [actions]="actions()"
      (toggleRow)="toggleRow($event)"
      (onAction)="onAction.emit($event)"
      (onRowClick)="handleRowClick($event)"
    ></app-cards-view>

    <!-- VUE TABLEAU -->
    <app-table-view
      *ngIf="viewMode() === 'table'"
      [data]="displayedData()"
      [selectedIds]="selectedIds()"
      [getBadgeClass]="getBadgeClass"
      [actions]="actions()"
      (toggleRow)="toggleRow($event)"
      (toggleAll)="toggleAll()"
      (onAction)="onAction.emit($event)"
      (onSort)="handleSort($event)"
      (onRowClick)="handleRowClick($event)"
    ></app-table-view>

    <!-- VUE TIMELINE -->
    <app-timeline-view
      *ngIf="viewMode() === 'timeline'"
      [data]="displayedData()"
      [selectedIds]="selectedIds()"
      [getBadgeClass]="getBadgeClass"
      [actions]="actions()"
      (toggleRow)="toggleRow($event)"
      (onAction)="onAction.emit($event)"
      (onRowClick)="handleRowClick($event)"
    ></app-timeline-view>

    <!-- ÉTAT VIDE -->
    <div *ngIf="data().length === 0" class="py-16 text-center">
      <div class="inline-flex flex-col items-center gap-4">
        <div class="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center">
          <lucide-icon [name]="Inbox" class="w-10 h-10 text-slate-300"></lucide-icon>
        </div>
        <div class="space-y-1">
          <p class="text-sm font-semibold text-slate-700">Aucun élément trouvé</p>
          <p class="text-xs text-slate-500">Essayez de modifier vos filtres</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ======================================= -->
<!-- FOOTER (Pagination + Infos) -->
<!-- ======================================= -->
<div class="px-6 py-4 border-t border-slate-100 bg-slate-50/30 flex items-center justify-between">
  <!-- Informations -->
  <div class="text-xs text-slate-500">
    <span class="font-medium">{{ data().length }}</span> sur
    <span class="font-medium">{{ total() }}</span> elements
  </div>

  <!-- Pagination -->
  <div class="flex items-center gap-4">
    <div class="flex items-center gap-2">
      <button class="pagination-button" [disabled]="page() === 0" (click)="previousPage()">
        <lucide-icon [name]="ChevronLeft" class="w-4 h-4"></lucide-icon>
      </button>

      <div class="flex items-center gap-1">
        <button
          *ngFor="let p of pageNumbers()"
          class="pagination-page"
          [class.active]="p === page()"
          (click)="goToPage(p)"
        >
          {{ p + 1 }}
        </button>
      </div>

      <button class="pagination-button" [disabled]="page() >= totalPages() - 1" (click)="nextPage()">
        <lucide-icon [name]="ChevronRight" class="w-4 h-4"></lucide-icon>
      </button>
    </div>
  </div>
</div>
