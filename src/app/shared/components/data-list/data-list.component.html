<div [ngClass]="cardMode() ? 'bg-white rounded-2xl shadow-sm hover:shadow-md' : 'bg-transparent'" class="flex flex-col transition-all overflow-hidden">

  <!-- ======================================= -->
  <!-- TOOLBAR (Tabs + Sélecteur de vues + Recherche) -->
  <!-- ======================================= -->
  <div class="flex items-center justify-between bg-white px-6 h-14" *ngIf="cardMode()">

    <!-- Mode Sélection (quand des éléments sont sélectionnés) -->
    <div *ngIf="selectionState().count > 0" class="flex items-center gap-4 animate-in slide-in-from-left">
      <!-- Compteur de sélection -->
      <div class="flex items-center gap-3 bg-primary-50/50 px-3 py-1.5 rounded-xl">
        <span class="text-sm font-semibold text-primary-700">
          {{ selectionState().count }} sélectionné(s)
        </span>
        <button
          (click)="clearSelection()"
          class="w-6 h-6 rounded-full hover:bg-primary-100 flex items-center justify-center"
          title="Effacer la sélection"
        >
          <lucide-icon [name]="X" class="w-3.5 h-3.5 text-primary-600"></lucide-icon>
        </button>
      </div>

      <!-- Séparateur -->
      <div class="h-5 w-px bg-slate-200"></div>

      <!-- Actions groupées -->
      <div class="flex items-center gap-1">
        <button
          (click)="onBulkValidate.emit(getSelectedIdsArray())"
          class="action-button validate"
          title="Valider la sélection"
        >
          <lucide-icon [name]="CheckCircle" class="w-4 h-4"></lucide-icon>
        </button>
        <button class="action-button archive" title="Archiver">
          <lucide-icon [name]="Archive" class="w-4 h-4"></lucide-icon>
        </button>
        <button class="action-button delete" title="Supprimer">
          <lucide-icon [name]="Trash2" class="w-4 h-4"></lucide-icon>
        </button>
        <button class="action-button export" title="Exporter">
          <lucide-icon [name]="Download" class="w-4 h-4"></lucide-icon>
        </button>
      </div>
    </div>

    <!-- Mode Normal (pas de sélection) -->
    <div *ngIf="selectionState().count === 0" class="flex items-center gap-4 flex-1">
      <!-- Checkbox "Tout sélectionner" -->
      <mat-checkbox
        color="primary"
        [checked]="selectionState().isAllSelected"
        [indeterminate]="selectionState().isPartiallySelected"
        (change)="toggleAll()"
        class="select-checkbox"
        title="Tout sélectionner"
      ></mat-checkbox>

      <!-- Onglets -->
      <nav class="flex gap-1" role="tablist">
        <button
          *ngFor="let tab of tabs()"
          (click)="onTabChange.emit(tab.label)"
          role="tab"
          [attr.aria-selected]="activeTab() === tab.label"
          class="tab-button"
          [class.active]="activeTab() === tab.label"
        >
          <lucide-icon *ngIf="tab.icon" [name]="tab.icon" class="w-4 h-4"></lucide-icon>
          <span>{{ tab.label }}</span>
          <span *ngIf="tab.count" class="badge" [class.active]="activeTab() === tab.label">
            {{ tab.count }}
          </span>
        </button>
      </nav>

      <!-- Bouton Filtres -->
      <button
        *ngIf="showFilterButton()"
        (click)="toggleFilters()"
        class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium transition-all"
        [ngClass]="isFiltersOpen() ? 'bg-primary-50 text-primary-700 border border-primary-200' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'"
      >
        <lucide-icon [name]="Filter" class="w-4 h-4"></lucide-icon>
        <span>Filtres</span>
      </button>

      <!-- Zone droite (sélecteur de vues + recherche) -->
      <div class="ml-auto flex items-center gap-3">

        <div class="view-switcher">
          <button
            [matMenuTriggerFor]="viewMenu"
            class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-medium transition-colors"
          >
            <lucide-icon [name]="getCurrentViewIcon()" class="w-4 h-4 text-primary-600"></lucide-icon>
            <span class="hidden sm:inline">{{ getCurrentViewLabel() }}</span>
            <lucide-icon [name]="ChevronDown" class="w-3.5 h-3.5 text-slate-500"></lucide-icon>
          </button>
          <mat-menu #viewMenu="matMenu" class="view-menu" xPosition="before" yPosition="below">
            <!-- En-tête -->
            <div class="menu-header">
              <lucide-icon [name]="LayoutGrid" class="w-3.5 h-3.5"></lucide-icon>
              <span>Changer l'affichage</span>
            </div>

            <!-- Options de vues -->
            <button
              *ngFor="let view of availableViews()"
              mat-menu-item
              (click)="setViewMode(view.id)"
              class="view-menu-item"
              [class.active]="viewMode() === view.id"
            >
              <div class="menu-item-content">
                <div class="menu-item-left">
                  <lucide-icon [name]="view.icon" class="w-5 h-5" [class.text-primary-600]="viewMode() === view.id"></lucide-icon>
                </div>

                <div class="menu-item-center">
                  <div class="menu-item-title">
                    <span>{{ view.label }}</span>
                    <span *ngIf="isNewView(view.id)" class="new-badge">Nouveau</span>
                  </div>
                  <div class="menu-item-description">{{ view.description }}</div>
                </div>

                <!-- Checkmark pour la vue active -->
                <div class="menu-item-right" *ngIf="viewMode() === view.id">
                  <lucide-icon [name]="Check" class="w-4 h-4 text-primary-600"></lucide-icon>
                </div>
              </div>
            </button>

            <!-- Footer -->
            <div class="menu-footer">
              <lucide-icon [name]="Sparkles" class="w-3.5 h-3.5"></lucide-icon>
              <span>Préférence sauvegardée automatiquement</span>
            </div>
          </mat-menu>
        </div>

        <!-- RECHERCHE -->
        <div class="relative" *ngIf="showSearch()">
          <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
            <lucide-icon [name]="Search" class="w-4 h-4"></lucide-icon>
          </div>
          <input
            type="text"
            [ngModel]="searchQuery()"
            (ngModelChange)="updateSearch($event)"
            placeholder="Rechercher..."
            class="search-input"
            [class.has-value]="searchState().isActive"
          />
          <button
            *ngIf="searchState().isActive"
            (click)="clearSearch()"
            class="search-clear"
            aria-label="Effacer la recherche"
          >
            <lucide-icon [name]="X" class="w-3.5 h-3.5"></lucide-icon>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Barre de Filtres Avancés (Dépliable) -->
  <div *ngIf="isFiltersOpen()" class="flex items-center gap-4 bg-slate-50/50 border-b border-slate-100 px-6 py-3 animate-in slide-in-from-top duration-200">
    <div class="flex items-center gap-2 text-slate-400 mr-2">
      <lucide-icon [name]="Filter" class="w-3.5 h-3.5"></lucide-icon>
      <span class="text-[10px] font-bold uppercase tracking-widest">Filtres actifs</span>
    </div>
    <div class="flex flex-1 items-center gap-3">
      <ng-content select="[filters]"></ng-content>
    </div>
    <button (click)="isFiltersOpen.set(false)" class="text-[10px] font-bold text-primary-600 hover:underline">
      Réinitialiser
    </button>
  </div>

  <!-- ======================================= -->
  <!-- ZONE DE CONTENU DYNAMIQUE (selon la vue) -->
  <!-- ======================================= -->
  <div class="relative min-h-[400px]">

    <!-- BANNIÈRE DE RAFRAÎCHISSEMENT (Impératif 3) -->
    <app-fw-refresh-banner
      [visible]="isStale()"
      (onRefresh)="onRefresh.emit()"
    ></app-fw-refresh-banner>

    <!-- ÉTAT DE CHARGEMENT INITIAL (Skeletons) -->
    <div *ngIf="isLoading() && data().length === 0" class="p-6">
      <!-- Skeletons pour la vue Cards (isolés car pas d'en-tête fixe) -->
      <div *ngIf="viewMode() === 'cards'" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <fw-card-skeleton *ngFor="let i of [1,2,3,4,5,6]" [density]="isFiltersOpen() ? 'compact' : 'comfortable'"></fw-card-skeleton>
      </div>

      <!-- Note: Pour Table et Expandable, le skeleton est désormais géré à l'intérieur des composants de vue
           pour préserver le positionnement des colonnes et l'en-tête. -->
    </div>

    <!-- Loader Overlay (uniquement lors du rafraîchissement de données existantes) -->
    <fw-block-loader
      *ngIf="isLoading() && data().length > 0"
      [center]="true"
      message="Mise à jour..."
    ></fw-block-loader>

    <!-- VUE EXTENSIBLE -->
    <app-expandable-view
      *ngIf="viewMode() === 'expandable'"
      [data]="displayedData()"
      [isLoading]="isLoading()"
      [selectedIds]="selectedIds()"
      [expandedIds]="expandedIds()"
      [getBadgeClass]="getBadgeClass"
      [actions]="actions()"
      (toggleRow)="toggleRow($event)"
      (toggleExpand)="toggleExpand($event)"
      (onAction)="onAction.emit($event)"
      (onRowClick)="handleRowClick($event)"
    ></app-expandable-view>

    <!-- VUE CARTES -->
    <app-cards-view
      *ngIf="viewMode() === 'cards' && (data().length > 0 || !isLoading())"
      [data]="displayedData()"
      [selectedIds]="selectedIds()"
      [getBadgeClass]="getBadgeClass"
      [actions]="actions()"
      (toggleRow)="toggleRow($event)"
      (onAction)="onAction.emit($event)"
      (onRowClick)="handleRowClick($event)"
    ></app-cards-view>

    <!-- VUE TABLEAU -->
    <app-table-view
      *ngIf="viewMode() === 'table'"
      [data]="displayedData()"
      [isLoading]="isLoading()"
      [selectedIds]="selectedIds()"
      [getBadgeClass]="getBadgeClass"
      [actions]="actions()"
      (toggleRow)="toggleRow($event)"
      (toggleAll)="toggleAll()"
      (onAction)="onAction.emit($event)"
      (onSort)="handleSort($event)"
      (onRowClick)="handleRowClick($event)"
    ></app-table-view>

    <!-- VUE TIMELINE -->
    <app-timeline-view
      *ngIf="viewMode() === 'timeline'"
      [data]="displayedData()"
      [selectedIds]="selectedIds()"
      [getBadgeClass]="getBadgeClass"
      [actions]="actions()"
      (toggleRow)="toggleRow($event)"
      (onAction)="onAction.emit($event)"
      (onRowClick)="handleRowClick($event)"
    ></app-timeline-view>

    <!-- ÉTAT VIDE -->
    <div *ngIf="data().length === 0 && !isLoading()" class="py-12 px-6">
      <app-fw-empty-state
        [icon]="Inbox"
        title="Aucun résultat trouvé"
        description="Nous n'avons trouvé aucun élément correspondant à vos critères de recherche ou à vos filtres actuels."
        [density]="isFiltersOpen() ? 'compact' : 'comfortable'"
      >
      </app-fw-empty-state>
    </div>
  </div>
</div>

  <!-- ======================================= -->
  <!-- FOOTER (Pagination + Infos) -->
  <!-- ======================================= -->
  <div class="list-footer-academic" *ngIf="totalPages() > 1 || data().length > 0">
    <!-- Informations techniques -->
    <div class="results-metrics">
      <span class="count">{{ data().length }}</span>
      <span class="separator">/</span>
      <span class="total">{{ total() }}</span>
      <span class="label">enregistrements</span>
    </div>

    <!-- Pagination Institutionnelle -->
    <div class="pagination-academic" *ngIf="totalPages() > 1">
      <app-fw-button
        variant="tertiary"
        size="sm"
        [icon]="ChevronLeft"
        [disabled]="page() === 0"
        (click)="previousPage()">
      </app-fw-button>

      <div class="page-numbers">
        <button
          *ngFor="let p of pageNumbers()"
          (click)="goToPage(p)"
          class="page-number-item"
          [class.active]="p === page()"
        >
          {{ p + 1 }}
        </button>
      </div>

      <app-fw-button
        variant="tertiary"
        size="sm"
        [icon]="ChevronRight"
        [disabled]="page() >= totalPages() - 1"
        (click)="nextPage()">
      </app-fw-button>
    </div>
  </div>
