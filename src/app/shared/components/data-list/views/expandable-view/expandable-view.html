<div class="space-y-2">
  <!-- SKELETONS (SI CHARGEMENT) -->
  <ng-container *ngIf="isLoading() && data().length === 0">
    <div *ngFor="let i of [1,2,3,4,5]" class="flex items-center px-6 py-5 animate-pulse bg-white">
      <div class="flex items-center gap-4 w-20">
        <fw-skeleton shape="rect" width="18px" height="18px" radius="4px"></fw-skeleton>
        <fw-skeleton shape="rect" width="16px" height="16px" radius="4px"></fw-skeleton>
      </div>
      <div class="flex-1 grid grid-cols-12 gap-6 items-center">
        <div class="col-span-5 flex items-center gap-3">
          <fw-skeleton shape="rect" width="40px" height="40px" radius="12px"></fw-skeleton>
          <div class="flex flex-col gap-1.5 w-full">
            <fw-skeleton width="60%" height="14px"></fw-skeleton>
            <fw-skeleton width="40%" height="10px"></fw-skeleton>
          </div>
        </div>
        <div class="col-span-3">
          <fw-skeleton shape="pill" width="80px" height="24px"></fw-skeleton>
        </div>
        <div class="col-span-2">
          <fw-skeleton width="80px" height="12px"></fw-skeleton>
        </div>
        <div class="col-span-2 flex justify-end gap-2">
          <fw-skeleton shape="circle" width="36px" height="36px"></fw-skeleton>
        </div>
      </div>
    </div>
  </ng-container>

  <!-- LISTE DES DONNÉES -->
  <div
    *ngFor="let row of data()"
    class="expand-row-group"
    [class.is-selected]="isSelected(row.id)"
    [class.is-expanded]="isExpanded(row.id)"
  >
    <!-- Ligne principale -->
    <div
      class="expand-main-row"
      (click)="toggleExpand.emit(row.id)"
    >
      <!-- Checkbox et icône d'expansion -->
      <div class="selection-area" (click)="$event.stopPropagation()">
        <mat-checkbox
          color="primary"
          [checked]="isSelected(row.id)"
          (change)="toggleRow.emit(row.id)"
          class="row-checkbox"
        ></mat-checkbox>
        <lucide-icon
          [name]="isExpanded(row.id) ? ChevronDown : ChevronRight"
          class="expand-icon"
        ></lucide-icon>
      </div>

      <!-- Contenu principal -->
      <div class="content-area grid grid-cols-12 gap-6 items-center flex-1">
        <!-- Avatar + Titre -->
        <div class="col-span-5 flex items-center gap-4">
          <div class="row-avatar">
            <img *ngIf="row.avatarUrl" [src]="row.avatarUrl" [alt]="row.title" class="avatar-img" />
            <span *ngIf="!row.avatarUrl" class="avatar-fallback">
              {{ row.avatarLabel || row.title.charAt(0) || '?' }}
            </span>
          </div>
          <div class="flex flex-col min-w-0">
            <span class="row-title">{{ row.title }}</span>
            <span class="row-subtitle">{{ row.subtitle }}</span>
          </div>
        </div>

        <!-- Statut (Badge) -->
        <div class="col-span-3">
          <app-fw-badge *ngIf="row.badges?.[0] as b" [status]="b.label" [tokenOverride]="$any(b.type)" size="xs"></app-fw-badge>
        </div>

        <!-- Date / Metadata -->
        <div class="col-span-2 text-xs font-bold text-slate-medium uppercase tracking-wider">
          {{ row.date || '—' }}
        </div>

        <!-- Actions rapides -->
        <div class="col-span-2 flex justify-end gap-1" (click)="$event.stopPropagation()">
          <ng-container *ngFor="let action of actions().slice(0, 2)">
            <app-fw-button
              *ngIf="!action.hideIf || !action.hideIf(row)"
              (click)="onAction.emit({ actionId: action.id, row: row })"
              [disabled]="!!(action.disableIf && action.disableIf(row))"
              [variant]="'tertiary'"
              [size]="'sm'"
              [icon]="action.icon"
              [title]="action.label"
            ></app-fw-button>
          </ng-container>
        </div>
      </div>
    </div>

    <!-- Zone dépliée (Détails) -->
    <div *ngIf="isExpanded(row.id)" class="expand-details-area">
      <div class="details-grid">
        <!-- Colonne Info -->
        <div class="info-column">
          <h4 class="details-title">Fiche Détails</h4>
          
          <div class="details-content space-y-6">
            <!-- Badges secondaires -->
            <div *ngIf="row.badges && row.badges.length > 1" class="flex flex-wrap gap-2">
              <app-fw-badge 
                *ngFor="let badge of row.badges.slice(1)" 
                [status]="badge.label" 
                [tokenOverride]="$any(badge.type)" 
                size="xs">
              </app-fw-badge>
            </div>

            <!-- Metadata dynamique -->
            <div *ngIf="getDisplayableMetadata(row).length > 0" class="metadata-grid">
              <div *ngFor="let item of getDisplayableMetadata(row)" class="metadata-item">
                <span class="meta-label">{{ item.key }}</span>
                <span class="meta-value">{{ item.value || '—' }}</span>
              </div>
            </div>

            <!-- Données brutes (DEBUG) -->
            <details *ngIf="row.rawData" class="debug-details">
              <summary>Données système (JSON)</summary>
              <pre>{{ row.rawData | json }}</pre>
            </details>
          </div>
        </div>

        <!-- Colonne Actions -->
        <div class="actions-column">
          <h4 class="details-title">Opérations</h4>
          <div class="flex flex-col gap-2">
            <ng-container *ngFor="let action of actions()">
              <app-fw-button
                *ngIf="!action.hideIf || !action.hideIf(row)"
                (click)="onAction.emit({ actionId: action.id, row: row })"
                [disabled]="!!(action.disableIf && action.disableIf(row))"
                [variant]="$any(action.type === 'danger' ? 'danger' : 'tertiary')"
                [size]="'sm'"
                class="w-full"
                [icon]="action.icon"
              >
                {{ action.label }}
              </app-fw-button>
            </ng-container>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
