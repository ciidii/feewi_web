<div class="space-y-8 animate-in fade-in duration-500">
  <!-- Page Header -->
  <header class="flex justify-between items-end">
    <div class="space-y-1">
      <div class="flex items-center gap-2 text-amber-600 mb-1">
        <lucide-icon [name]="ShieldCheck" class="w-4 h-4"></lucide-icon>
        <span class="text-[10px] font-bold uppercase tracking-widest">Console SaaS Système</span>
      </div>
      <h1 class="text-3xl font-display font-bold text-midnight tracking-tight">Gestion des Établissements</h1>
      <p class="text-sm text-slate-medium font-medium">Supervisez les écoles, les licences et les domaines du réseau Feewi.</p>
    </div>

    <div class="flex gap-3">
      <button
        routerLink="/saas/tenants/new"
        class="flex items-center gap-2 px-5 py-2.5 bg-midnight text-white rounded-xl text-[13px] font-bold hover:bg-slate-800 transition-all shadow-lg shadow-midnight/10 active:scale-95"
      >
        <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
        Nouvel Établissement
      </button>
    </div>
  </header>

  <!-- Table Component -->
  <app-data-list
    [data]="tenants()"
    [tabs]="tenantTabs()"
    [activeTab]="activeTab()"
    [total]="totalTenants()"
    [page]="currentPage()"
    [totalPages]="totalPages()"
    [actions]="tenantActions"
    (onTabChange)="onTabChange($event)"
    (onSearch)="onSearch($event)"
    (onPageChange)="onPageChange($event)"
    (onAction)="handleAction($event)"
  ></app-data-list>
</div>
