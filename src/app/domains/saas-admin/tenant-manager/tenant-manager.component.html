<app-fw-page-shell
  title="Gestion des Établissements"
  description="Supervisez les écoles et les domaines du réseau Feewi."
  [icon]="Building2"
  density="compact"
>
  <div actions>
    <button
      *fwHasPermission="'identity:saas:school:create'"
      routerLink="/saas/tenants/new"
      class="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-slate-800 transition-all active:scale-95 shadow-sm"
    >
      <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
      Nouvel Établissement
    </button>
  </div>

  <!-- Table Component -->
  <app-data-list
    [data]="tenants()"
    [tabs]="tenantTabs()"
    [activeTab]="activeTab()"
    [total]="totalTenants()"
    [page]="currentPage()"
    [totalPages]="totalPages()"
    [actions]="tenantActions"
    [isLoading]="isLoading()"
    (onTabChange)="onTabChange($event)"
    (onSearch)="onSearch($event)"
    (onPageChange)="onPageChange($event)"
    (onAction)="handleAction($event)"
  ></app-data-list>
</app-fw-page-shell>
