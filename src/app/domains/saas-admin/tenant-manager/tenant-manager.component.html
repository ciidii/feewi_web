<div class="space-y-6 animate-in fade-in duration-500">
  <!-- Page Header Épuré -->
  <header class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Gestion des Établissements</h1>
      <p class="text-sm text-slate-500 font-medium">Supervisez les écoles et les domaines du réseau Feewi.</p>
    </div>

    <button
      routerLink="/saas/tenants/new"
      class="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-slate-800 transition-all active:scale-95 shadow-sm"
    >
      <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
      Nouvel Établissement
    </button>
  </header>

  <!-- Table Component -->
  <app-data-list
    [data]="tenants()"
    [tabs]="tenantTabs()"
    [activeTab]="activeTab()"
    [total]="totalTenants()"
    [page]="currentPage()"
    [totalPages]="totalPages()"
    [actions]="tenantActions"
    [isLoading]="isLoading()"
    (onTabChange)="onTabChange($event)"
    (onSearch)="onSearch($event)"
    (onPageChange)="onPageChange($event)"
    (onAction)="handleAction($event)"
  ></app-data-list>
</div>
