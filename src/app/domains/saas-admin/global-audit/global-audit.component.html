<app-fw-page-shell
  title="Journal d'Audit Global"
  description="Historique complet des actions sensibles effectuées sur la plateforme Feewi."
  [icon]="HistoryIcon"
  density="compact"
>
  <div actions>
    <button (click)="exportCsv()" [disabled]="isExporting()"
            class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-xl text-xs font-bold hover:bg-slate-50 transition-all shadow-sm disabled:opacity-50">
      <lucide-icon [name]="Download" class="w-4 h-4"></lucide-icon>
      {{ isExporting() ? 'Export en cours…' : 'Exporter CSV' }}
    </button>
  </div>

<div class="space-y-8 animate-in fade-in duration-500">
  <!-- Table Component -->
  <app-data-list
    [data]="auditRows()"
    [total]="totalElements()"
    [page]="currentPage()"
    [totalPages]="totalPages()"
    [isLoading]="isLoading()"
    [cardMode]="false"
    defaultView="table"
    [showSearch]="false"
    [showFilterButton]="false"
    (onPageChange)="onPageChange($event)"
  ></app-data-list>
</div>
</app-fw-page-shell>
