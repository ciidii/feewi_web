<div class="space-y-8 animate-in fade-in duration-500">
  <!-- Page Header -->
  <header class="flex justify-between items-end">
    <div class="space-y-1">
      <div class="flex items-center gap-2 text-primary-600 mb-1">
        <lucide-icon [name]="HistoryIcon" class="w-4 h-4"></lucide-icon>
        <span class="text-[10px] font-bold uppercase tracking-widest">Surveillance Système</span>
      </div>
      <h1 class="text-3xl font-display font-bold text-midnight tracking-tight">Journal d'Audit Global</h1>
      <p class="text-sm text-slate-medium font-medium">Historique complet des actions sensibles effectuées sur la plateforme Feewi.</p>
    </div>

    <div class="flex gap-3">
      <button class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-xl text-xs font-bold hover:bg-slate-50 transition-all shadow-sm">
        <lucide-icon [name]="Download" class="w-4 h-4"></lucide-icon>
        Exporter CSV
      </button>
    </div>
  </header>

  <!-- Barre d'outils -->
  <div class="flex items-center justify-between gap-4">
    <div class="relative flex-1 max-w-md">
      <lucide-icon [name]="Search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></lucide-icon>
      <input
        type="text"
        placeholder="Rechercher un acteur ou une action..."
        class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all"
      >
    </div>

    <button class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-colors">
      <lucide-icon [name]="Filter" class="w-5 h-5"></lucide-icon>
    </button>
  </div>

  <!-- Table Component -->
  <app-data-list
    [data]="auditRows()"
    [tabs]="auditTabs"
    [total]="totalElements()"
    [page]="currentPage()"
    [totalPages]="totalPages()"
    [isLoading]="isLoading()"
    (onPageChange)="onPageChange($event)"
  ></app-data-list>
</div>
