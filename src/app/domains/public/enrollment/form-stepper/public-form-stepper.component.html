<div class="onboarding-layout" *ngIf="config() && !isPortalClosed(); else initialLoading">

  <!-- BARRE LATÉRALE DE PROGRESSION -->
  <aside class="onboarding-sidebar">
    <div class="sidebar-header">
      <div class="school-logo">
        <img *ngIf="tenantContext.activeTenant()?.logoUrl" [src]="tenantContext.activeTenant()?.logoUrl" [alt]="tenantContext.activeTenant()?.name">
        <lucide-icon *ngIf="!tenantContext.activeTenant()?.logoUrl" [name]="GraduationCap" [size]="28"></lucide-icon>
      </div>
      <div class="school-meta">
        <span class="school-name">{{ tenantContext.activeTenant()?.name || 'Établissement' }}</span>
        <span class="year-pill" *ngIf="targetYearId()">Rentrée {{ targetYearId() }}</span>
      </div>
    </div>

    <nav class="onboarding-nav">
      <div class="nav-step" [class.active]="currentStep() === 'GUARDIAN'" [class.completed]="progress() > 15">
        <div class="step-icon"><lucide-icon [name]="Users"></lucide-icon></div>
        <div class="step-text"><span class="step-label">Famille</span></div>
      </div>
      <div class="nav-step" [class.active]="currentStep() === 'STUDENT'" [class.completed]="progress() > 30">
        <div class="step-icon"><lucide-icon [name]="User"></lucide-icon></div>
        <div class="step-text"><span class="step-label">Enfant</span></div>
      </div>
      <div class="nav-step" [class.active]="currentStep() === 'MEDICAL'" [class.completed]="progress() > 45">
        <div class="step-icon"><lucide-icon [name]="HeartPulse"></lucide-icon></div>
        <div class="step-text"><span class="step-label">Santé</span></div>
      </div>
      <div class="nav-step" *ngIf="config()?.schema?.services?.enabled" [class.active]="currentStep() === 'SERVICES'" [class.completed]="progress() > 60">
        <div class="step-icon"><lucide-icon [name]="LayoutGrid"></lucide-icon></div>
        <div class="step-text"><span class="step-label">Services</span></div>
      </div>
      <div class="nav-step" [class.active]="currentStep() === 'DOCS'" [class.completed]="progress() > 75">
        <div class="step-icon"><lucide-icon [name]="FileText"></lucide-icon></div>
        <div class="step-text"><span class="step-label">Documents</span></div>
      </div>
      <div class="nav-step" [class.active]="currentStep() === 'REVIEW'">
        <div class="step-icon"><lucide-icon [name]="CheckCircle"></lucide-icon></div>
        <div class="step-text"><span class="step-label">Validation</span></div>
      </div>
    </nav>

    <!-- RÉASSURANCE : CODES DE RÉCUPÉRATION -->
    <div class="session-recovery-box" *ngIf="bundleRef()">
      <div class="recovery-header">
        <lucide-icon [name]="Lock" [size]="14"></lucide-icon>
        <span>Accès à votre dossier</span>
      </div>
      <div class="recovery-codes">
        <div class="code-item"><span class="label">Référence</span><span class="value">{{ bundleRef() }}</span></div>
        <div class="code-item"><span class="label">Code secret</span><span class="value secret">{{ accessCode() }}</span></div>
      </div>
    </div>
  </aside>

  <!-- ZONE DE SAISIE CENTRALE -->
  <main class="onboarding-main">
    <div class="main-container">

      <app-step-family
        *ngIf="currentStep() === 'GUARDIAN'"
        [data]="formStore.family"
        [customFields]="config()?.schema?.family?.guardianCustomFields || []">
      </app-step-family>

      <app-step-identity
        *ngIf="currentStep() === 'STUDENT'"
        [identity]="formStore.identity"
        [schooling]="formStore.schooling"
        [customFields]="config()?.schema?.identity?.customFields || []"
        [availableLevels]="availableLevels()"
        (onLevelChange)="onLevelChange($event)">
      </app-step-identity>

      <app-step-medical
        *ngIf="currentStep() === 'MEDICAL'"
        [medical]="formStore.medical"
        [customFields]="config()?.schema?.medical?.customFields || []">
      </app-step-medical>

      <app-step-services
        *ngIf="currentStep() === 'SERVICES'"
        [services]="formStore.services"
        [enabledServices]="availableServiceCodes()">
      </app-step-services>

      <app-step-vault
        *ngIf="currentStep() === 'DOCS'"
        [checklist]="config()?.schema?.documents?.presetDocuments || []"
        [application]="admission()"
        [uploadingDocCode]="uploadingDocCode()"
        (onFileSelected)="onVaultFileSelected($event)">
      </app-step-vault>

      <app-step-review
        *ngIf="currentStep() === 'REVIEW'"
        [family]="formStore.family"
        [identity]="formStore.identity"
        [schooling]="formStore.schooling"
        [consent]="consent">
      </app-step-review>

      <!-- NAVIGATION FOOTER -->
      <footer class="onboarding-footer">
        <button type="button" class="btn-ghost" (click)="prevStep()" *ngIf="currentStep() !== 'GUARDIAN'">
          <lucide-icon [name]="ArrowLeft" [size]="18"></lucide-icon> Retour
        </button>
        <div class="spacer"></div>
        <button type="button" class="btn-premium-action" (click)="currentStep() === 'REVIEW' ? submitFinal() : nextStep()" [disabled]="isSubmitting() || (currentStep() === 'REVIEW' && !consent.checked)">
          <lucide-icon *ngIf="isSubmitting()" [name]="RefreshCw" [size]="20" class="animate-spin"></lucide-icon>
          <span>{{ currentStep() === 'REVIEW' ? 'Soumettre le dossier' : 'Continuer' }}</span>
          <lucide-icon *ngIf="!isSubmitting() && currentStep() !== 'REVIEW'" [name]="ArrowRight" [size]="20"></lucide-icon>
        </button>
      </footer>
    </div>
  </main>

</div>

<ng-template #initialLoading>
  <div class="onboarding-loader">
    <lucide-icon [name]="RefreshCw" [size]="48" class="animate-spin text-primary"></lucide-icon>
    <p>Sécurisation du portail...</p>
  </div>
</ng-template>
