<div class="min-h-screen bg-surface-page flex items-center justify-center p-6 animate-fade">
  <div class="w-full max-w-md bg-white p-10 rounded-3xl border border-border shadow-lg">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-primary-alpha text-primary rounded-2xl mb-6">
        <lucide-icon [name]="RefreshCcw" [size]="28"></lucide-icon>
      </div>
      <h1 class="text-2xl font-display font-black text-midnight tracking-tight">Nouveau mot de passe</h1>
      <p class="text-sm text-text-secondary font-medium mt-2">Créez vos nouveaux identifiants de sécurité.</p>
    </div>

    <!-- Formulaire -->
    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div class="space-y-4">
        <!-- Email (Read-only or Pre-filled) -->
        <div class="fw-field">
          <label class="fw-label">Compte concerné</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-text-tertiary">
              <lucide-icon [name]="Mail" [size]="18"></lucide-icon>
            </div>
            <input 
              type="email" 
              formControlName="email"
              placeholder="votre@email.com"
              class="fw-input pl-10 opacity-70"
              readonly
            />
          </div>
        </div>

        <!-- Code OTP -->
        <div class="fw-field">
          <label class="fw-label">Code de vérification (6 chiffres)</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-text-tertiary group-focus-within:text-primary transition-colors">
              <lucide-icon [name]="ShieldCheck" [size]="18"></lucide-icon>
            </div>
            <input 
              type="text" 
              formControlName="code"
              placeholder="123456"
              maxlength="6"
              class="fw-input pl-10 tracking-[0.5em] font-black"
              [class.error]="isInvalid('code')"
            />
          </div>
          <span *ngIf="isInvalid('code')" class="fw-error">{{ getErrorMessage('code') }}</span>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <!-- Password -->
          <div class="fw-field">
            <label class="fw-label">Mot de passe</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-text-tertiary group-focus-within:text-primary transition-colors">
                <lucide-icon [name]="Lock" [size]="18"></lucide-icon>
              </div>
              <input 
                type="password"
                formControlName="newPassword"
                placeholder="••••••••"
                class="fw-input pl-10"
                [class.error]="isInvalid('newPassword')"
              />
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="fw-field">
            <label class="fw-label">Confirmation</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-text-tertiary group-focus-within:text-primary transition-colors">
                <lucide-icon [name]="Lock" [size]="18"></lucide-icon>
              </div>
              <input 
                type="password"
                formControlName="confirmPassword"
                placeholder="••••••••"
                class="fw-input pl-10"
                [class.error]="isInvalid('confirmPassword') || hasPasswordMismatch"
              />
            </div>
          </div>
        </div>
        <span *ngIf="isInvalid('newPassword')" class="fw-error">{{ getErrorMessage('newPassword') }}</span>
        <span *ngIf="hasPasswordMismatch" class="fw-error">Les mots de passe ne correspondent pas</span>
      </div>

      <!-- Actions -->
      <div class="space-y-4">
        <app-fw-button 
          type="submit" 
          [loading]="isLoading()"
          variant="primary"
          class="w-full"
        >
          Réinitialiser le mot de passe
        </app-fw-button>

        <a routerLink="/auth/login" class="flex items-center justify-center gap-2 text-sm font-bold text-text-secondary hover:text-midnight transition-colors group">
          <lucide-icon [name]="ArrowLeft" [size]="14" class="group-hover:-translate-x-1 transition-transform"></lucide-icon>
          Retour à la connexion
        </a>
      </div>
    </form>
  </div>
</div>
