<div class="auth-page">
  <div class="auth-card">
    <header class="auth-header">
      <a routerLink="/auth/login" class="back-link">
        <lucide-icon [name]="ArrowLeft" class="w-4 h-4"></lucide-icon>
        <span>Retour</span>
      </a>
      <div class="title-wrap">
        <div class="mb-2">
          <img src="feewi-icon.svg" alt="Feewi Logo" class="w-12 h-12 rounded-xl shadow-sm" />
        </div>
        <div>
          <h1>Mot de passe oublie</h1>
          <p>Demande de code OTP par email</p>
        </div>
      </div>
    </header>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="auth-form">
      <section class="section-block">
        <div class="section-head">
          <div class="step-pill">01</div>
          <span>Identification du compte</span>
        </div>

        <div class="field-wrap">
          <label>Adresse email</label>
          <div class="input-wrap" [class.error]="isInvalid('email')">
            <lucide-icon [name]="Mail" class="field-icon"></lucide-icon>
            <input type="email" formControlName="email" placeholder="admin@feewi.io" />
          </div>
          <p *ngIf="isInvalid('email')" class="error-text">
            <lucide-icon [name]="AlertCircle" class="w-3.5 h-3.5"></lucide-icon>
            <span>{{ getErrorMessage('email') }}</span>
          </p>
        </div>
      </section>

      <section class="info-box">
        <lucide-icon [name]="Info" class="w-4 h-4"></lucide-icon>
        <p>Un code a 6 chiffres sera envoye a cette adresse pour valider la reinitialisation.</p>
      </section>

      <footer class="auth-footer">
        <button type="submit" [disabled]="isLoading()" class="primary-btn">
          <lucide-icon *ngIf="isLoading()" [name]="Loader2" class="w-4 h-4 animate-spin"></lucide-icon>
          <lucide-icon *ngIf="!isLoading()" [name]="Send" class="w-4 h-4"></lucide-icon>
          <span>{{ isLoading() ? 'Envoi...' : 'Envoyer le code OTP' }}</span>
        </button>
      </footer>
    </form>
  </div>
</div>
