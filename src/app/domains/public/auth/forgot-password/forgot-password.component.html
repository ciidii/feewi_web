<div class="min-h-screen bg-surface-page flex items-center justify-center p-6 animate-fade">
  <div class="w-full max-w-md bg-white p-10 rounded-3xl border border-border shadow-lg">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-primary-alpha text-primary rounded-2xl mb-6">
        <lucide-icon [name]="KeyRound" [size]="28"></lucide-icon>
      </div>
      <h1 class="text-2xl font-display font-black text-midnight tracking-tight">Mot de passe oublié</h1>
      <p class="text-sm text-text-secondary font-medium mt-2">Nous vous enverrons un code de récupération par email.</p>
    </div>

    <!-- Info Alert -->
    <div class="bg-info-bg border border-info-border p-4 rounded-xl flex gap-3 items-start mb-8">
      <lucide-icon [name]="Info" [size]="18" class="text-info mt-0.5"></lucide-icon>
      <p class="text-xs font-semibold text-text-secondary leading-relaxed">
        Assurez-vous d'avoir accès à votre boîte mail pour récupérer le code OTP à 6 chiffres.
      </p>
    </div>

    <!-- Formulaire -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div class="fw-field">
        <label class="fw-label">Adresse Email</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-text-tertiary group-focus-within:text-primary transition-colors">
            <lucide-icon [name]="Mail" [size]="18"></lucide-icon>
          </div>
          <input 
            type="email" 
            formControlName="email"
            placeholder="votre@email.com"
            class="fw-input pl-10"
            [class.error]="isInvalid('email')"
          />
        </div>
        <span *ngIf="isInvalid('email')" class="fw-error">
          {{ getErrorMessage('email') }}
        </span>
      </div>

      <!-- Actions -->
      <div class="space-y-4">
        <app-fw-button 
          type="submit" 
          [loading]="isLoading()"
          variant="primary"
          class="w-full"
        >
          Envoyer le code
        </app-fw-button>

        <a routerLink="/auth/login" class="flex items-center justify-center gap-2 text-sm font-bold text-text-secondary hover:text-midnight transition-colors group">
          <lucide-icon [name]="ArrowLeft" [size]="14" class="group-hover:-translate-x-1 transition-transform"></lucide-icon>
          Retour à la connexion
        </a>
      </div>
    </form>
  </div>
</div>
