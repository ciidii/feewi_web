<div class="min-h-screen bg-ice flex items-center justify-center p-6 animate-in fade-in duration-500">
  <div class="w-full max-w-md space-y-8 bg-white p-10 rounded-2xl border border-border-subtle shadow-lg">
    
    <!-- Header : Logo & Titre -->
    <div class="text-center space-y-3">
      <div class="inline-flex mb-2">
        <img src="feewi-icon.svg" alt="Feewi Logo" class="w-16 h-16 shadow-lg shadow-primary/20 rounded-2xl" />
      </div>
      <h1 class="text-2xl font-display font-bold text-midnight tracking-tight">Connexion à Feewi</h1>
      <p class="text-sm text-slate-medium font-medium leading-relaxed">Entrez vos identifiants pour accéder à votre console d'administration.</p>
    </div>

    <!-- Formulaire de Connexion -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div class="space-y-5">
        <!-- Email Field -->
        <div class="space-y-1.5">
          <label class="text-[11px] font-bold text-slate-medium uppercase tracking-widest ml-1">Adresse Email</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none group-focus-within:text-primary transition-colors text-slate-medium">
              <lucide-icon [name]="Mail" class="w-4.5 h-4.5"></lucide-icon>
            </div>
            <input 
              type="email" 
              formControlName="email"
              placeholder="admin&#64;feewi.io"
              class="w-full bg-ice/40 border border-border-subtle rounded-xl py-3 pl-10 pr-4 text-sm font-semibold outline-none focus:ring-4 focus:ring-primary/5 focus:border-primary focus:bg-white transition-all placeholder:text-slate-300"
            />
          </div>
        </div>

        <!-- Password Field -->
        <div class="space-y-1.5">
          <div class="flex justify-between items-center ml-1">
            <label class="text-[11px] font-bold text-slate-medium uppercase tracking-widest">Mot de passe</label>
            <a routerLink="/auth/forgot-password" class="text-[10px] font-bold text-primary uppercase hover:underline">Oublié ?</a>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none group-focus-within:text-primary transition-colors text-slate-medium">
              <lucide-icon [name]="Lock" class="w-4.5 h-4.5"></lucide-icon>
            </div>
            <input 
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="w-full bg-ice/40 border border-border-subtle rounded-xl py-3 pl-10 pr-12 text-sm font-semibold outline-none focus:ring-4 focus:ring-primary/5 focus:border-primary focus:bg-white transition-all placeholder:text-slate-300"
            />
            <button 
              type="button"
              (click)="togglePassword()"
              class="absolute inset-y-0 right-3 flex items-center text-slate-medium hover:text-midnight transition-colors"
            >
              <lucide-icon [name]="showPassword() ? EyeOff : Eye" class="w-4 h-4"></lucide-icon>
            </button>
          </div>
        </div>
      </div>

      <!-- Error Alert -->
      <div *ngIf="loginError()" class="bg-red-50 border border-red-100 p-4 rounded-xl flex gap-3 items-center animate-in shake duration-300">
         <lucide-icon [name]="Lock" class="w-5 h-5 text-red-600"></lucide-icon>
         <p class="text-xs font-bold text-red-700">Identifiants incorrects. Veuillez réessayer.</p>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="loginForm.invalid || isLoading()"
        class="w-full bg-primary hover:bg-primary-hover disabled:bg-slate-200 text-white rounded-xl py-3.5 text-sm font-bold shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-95 transition-all flex items-center justify-center gap-2 group"
      >
        <lucide-icon *ngIf="isLoading()" [name]="Loader2" class="w-4.5 h-4.5 animate-spin"></lucide-icon>
        <span *ngIf="!isLoading()">Se connecter à Feewi</span>
      </button>
    </form>

    <!-- Footer Footer -->
    <div class="pt-4 text-center">
      <p class="text-xs text-slate-medium font-medium italic">Feewi Mono-SaaS Edition &copy; 2024</p>
    </div>

  </div>
</div>
