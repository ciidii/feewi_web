<div class="min-h-screen bg-surface-page flex items-center justify-center p-6 animate-fade">
  <div class="w-full max-w-md bg-white p-10 rounded-3xl border border-border shadow-lg">
    
    <!-- Header : Logo & Titre -->
    <div class="text-center mb-10">
      <div class="inline-flex mb-6">
        <img src="feewi-logo-compact.svg" alt="Feewi" class="w-14 h-14" />
      </div>
      <h1 class="text-2xl font-display font-black text-midnight tracking-tight">Console d'accès</h1>
      <p class="text-sm text-text-secondary font-medium mt-2">Gérez votre établissement en toute simplicité.</p>
    </div>

    <!-- Formulaire de Connexion -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div class="space-y-4">
        <!-- Email Field -->
        <div class="fw-field">
          <label class="fw-label">Identifiant</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-text-tertiary group-focus-within:text-primary transition-colors">
              <lucide-icon [name]="Mail" [size]="18"></lucide-icon>
            </div>
            <input 
              type="email" 
              formControlName="email"
              placeholder="votre@email.com"
              class="fw-input pl-10"
              [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            />
          </div>
        </div>

        <!-- Password Field -->
        <div class="fw-field">
          <div class="flex justify-between items-center mb-1">
            <label class="fw-label">Mot de passe</label>
            <a routerLink="/auth/forgot-password" class="text-[10px] font-bold text-primary uppercase hover:underline tracking-tighter">Oublié ?</a>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-text-tertiary group-focus-within:text-primary transition-colors">
              <lucide-icon [name]="Lock" [size]="18"></lucide-icon>
            </div>
            <input 
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="fw-input pl-10 pr-12"
              [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            />
            <button 
              type="button"
              (click)="togglePassword()"
              class="absolute inset-y-0 right-3 flex items-center text-text-tertiary hover:text-midnight transition-colors"
            >
              <lucide-icon [name]="showPassword() ? EyeOff : Eye" [size]="16"></lucide-icon>
            </button>
          </div>
        </div>
      </div>

      <!-- Error Alert -->
      <div *ngIf="loginError()" class="bg-error-bg border border-error-border p-4 rounded-xl flex gap-3 items-center animate-shake">
         <lucide-icon [name]="AlertCircle" [size]="18" class="text-error"></lucide-icon>
         <p class="text-xs font-bold text-error">Accès refusé. Vos identifiants sont incorrects.</p>
      </div>

      <!-- Submit Button -->
      <app-fw-button 
        type="submit" 
        [disabled]="loginForm.invalid"
        [loading]="isLoading()"
        variant="primary"
        class="w-full"
      >
        Démarrer la session
      </app-fw-button>
    </form>

    <!-- Footer -->
    <div class="mt-12 text-center">
      <p class="text-[10px] text-text-tertiary font-bold uppercase tracking-widest">Feewi Platform &copy; 2026</p>
    </div>

  </div>
</div>
