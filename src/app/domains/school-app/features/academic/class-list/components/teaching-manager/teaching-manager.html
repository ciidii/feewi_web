<div class="teaching-modal flex flex-col h-full bg-white rounded-3xl overflow-hidden shadow-2xl">
  
  <!-- Header dynamique -->
  <header class="px-8 py-6 border-b border-slate-100 flex items-center justify-between shrink-0 bg-white">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600">
        <lucide-icon [name]="BookOpenCheck" class="w-6 h-6"></lucide-icon>
      </div>
      <div>
        <h2 class="text-xl font-bold text-slate-900 italic uppercase tracking-tight">Affectations : {{ data.schoolClass.fullName }}</h2>
        <p class="text-xs text-slate-500 mt-0.5 font-medium">Assignez les professeurs aux matières pour cette classe.</p>
      </div>
    </div>
    <button (click)="close()" class="w-10 h-10 rounded-xl hover:bg-slate-50 flex items-center justify-center text-slate-400 transition-colors">
      <lucide-icon [name]="X" class="w-5 h-5"></lucide-icon>
    </button>
  </header>

  <!-- Corps : Liste des affectations -->
  <div class="flex-1 overflow-y-auto p-8 bg-slate-50/30 custom-scrollbar relative">
    
    <!-- Loader -->
    <div *ngIf="isLoading()" class="absolute inset-0 z-10 bg-white/60 backdrop-blur-sm flex items-center justify-center">
      <div class="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
    </div>

    <div class="space-y-6">
      <div class="flex items-center justify-between">
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Enseignements programmés</span>
        <button 
          *ngIf="!isAdding()"
          (click)="isAdding.set(true)"
          class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200"
        >
          <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
          Assigner un cours
        </button>
      </div>

      <app-data-list
        [data]="displayTeachings()"
        [total]="displayTeachings().length"
        [actions]="teachingActions"
      ></app-data-list>

      <!-- État vide -->
      <div *ngIf="displayTeachings().length === 0 && !isLoading() && !isAdding()" class="text-center py-16 border-2 border-dashed border-slate-200 rounded-3xl bg-white">
        <lucide-icon [name]="BookOpenCheck" class="w-12 h-12 text-slate-200 mx-auto mb-4"></lucide-icon>
        <p class="text-sm font-bold text-slate-400 italic">Aucun cours n'a encore été programmé pour cette classe.</p>
      </div>
    </div>
  </div>

  <!-- Footer : Formulaire d'affectation rapide -->
  <footer *ngIf="isAdding()" class="p-8 border-t border-slate-200 bg-white animate-in slide-in-from-bottom duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
    <form [formGroup]="assignForm" (ngSubmit)="onAssign()" class="space-y-6">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-sm font-bold text-slate-900 flex items-center gap-2">
          Nouvelle Affectation
          <lucide-icon [name]="ArrowRight" class="w-3.5 h-3.5 text-slate-300"></lucide-icon>
        </h3>
        <button type="button" (click)="isAdding.set(false)" class="text-xs font-bold text-slate-400 hover:text-slate-600 uppercase tracking-widest">Annuler</button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Sélection Matière (du programme) -->
        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Matière</label>
          <select formControlName="subjectId" (change)="onSubjectChange(subSelect.value)" #subSelect class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 text-sm font-semibold outline-none focus:border-indigo-500 focus:bg-white transition-all">
            <option value="">Choisir une matière...</option>
            <option *ngFor="let item of availableCurriculum()" [value]="item.subjectId">{{ item.subjectName }}</option>
          </select>
        </div>

        <!-- Sélection Professeur -->
        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Professeur</label>
          <select formControlName="teacherId" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 text-sm font-semibold outline-none focus:border-indigo-500 focus:bg-white transition-all">
            <option value="">Choisir un enseignant...</option>
            <option *ngFor="let staff of staffList()" [value]="staff.id">{{ staff.firstName }} {{ staff.lastName }}</option>
          </select>
        </div>

        <!-- Coefficient (Pre-rempli) -->
        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Coefficient</label>
          <input type="number" formControlName="coefficient" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 text-sm font-semibold outline-none focus:border-indigo-500 focus:bg-white transition-all" />
        </div>

        <!-- Note Max (Pre-rempli) -->
        <div class="space-y-2">
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Note Max</label>
          <input type="number" formControlName="maxScore" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 text-sm font-semibold outline-none focus:border-indigo-500 focus:bg-white transition-all" />
        </div>
      </div>

      <div class="flex justify-end pt-2">
        <button 
          type="submit" 
          [disabled]="assignForm.invalid"
          class="flex items-center gap-2 px-8 h-12 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-xl shadow-indigo-200 hover:bg-indigo-700 disabled:bg-slate-200 transition-all active:scale-95"
        >
          <lucide-icon [name]="Save" class="w-4 h-4"></lucide-icon>
          Valider l'affectation
        </button>
      </div>
    </form>
  </footer>
</div>
