<div class="space-y-8 animate-in fade-in duration-500">
  
  <!-- HEADER OPERAIONNEL -->
  <header class="flex justify-between items-end">
    <div class="space-y-1">
      <div class="flex items-center gap-2 text-primary-600 mb-1">
        <lucide-icon [name]="School" class="w-4 h-4"></lucide-icon>
        <span class="text-[10px] font-bold uppercase tracking-[0.2em]">Année Active : {{ currentYear()?.label || 'Chargement...' }}</span>
      </div>
      <h1 class="text-3xl font-display font-bold text-midnight tracking-tight uppercase italic">Gestion des Classes</h1>
      <p class="text-sm text-slate-medium font-medium">Configurez les instances physiques de classes pour l'année scolaire en cours.</p>
    </div>

    <div class="flex gap-3">
      <button 
        (click)="openAddClassForm()"
        [disabled]="isLoading()"
        class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-xl text-[13px] font-bold hover:bg-primary-hover transition-all shadow-lg shadow-primary/20 active:scale-95 disabled:opacity-50"
      >
        <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
        Ouvrir une classe
      </button>
    </div>
  </header>

  <!-- LISTE DES CLASSES (CARDS VIEW PAR DÉFAUT) -->
  <div class="relative min-h-[400px]">
    <!-- Loader local -->
    <div *ngIf="isLoading()" class="absolute inset-0 z-10 bg-white/50 backdrop-blur-[1px] flex items-center justify-center rounded-2xl border border-slate-100">
      <div class="flex flex-col items-center gap-3">
        <div class="w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        <span class="text-[10px] font-bold text-primary uppercase tracking-widest animate-pulse">Chargement des instances...</span>
      </div>
    </div>

    <app-data-list
      [data]="displayClasses()"
      [total]="displayClasses().length"
      [actions]="classActions"
      (onAction)="handleClassAction($event)"
    ></app-data-list>
  </div>

</div>
