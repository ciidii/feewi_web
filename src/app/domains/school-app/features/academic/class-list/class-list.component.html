<app-fw-page-shell
  title="Gestion des Classes"
  [description]="'Année Active : ' + (currentYear()?.label || '...') + ' • Configurez les instances physiques de classes.'"
  [icon]="School"
  density="compact"
>
  <!-- ACTIONS -->
  <div actions>
    <button 
      (click)="openAddClassForm()"
      [disabled]="isLoading()"
      class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-xl text-[13px] font-bold hover:bg-primary-hover transition-all shadow-lg shadow-primary/20 active:scale-95 disabled:opacity-50"
    >
      <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
      Ouvrir une classe
    </button>
  </div>

  <!-- LISTE DES CLASSES -->
  <div class="relative min-h-[400px] animate-in fade-in duration-500">
    <app-data-list
      [data]="displayClasses()"
      [total]="displayClasses().length"
      [actions]="classActions"
      [isLoading]="isLoading()"
      (onAction)="handleClassAction($event)"
    ></app-data-list>
  </div>

</app-fw-page-shell>
