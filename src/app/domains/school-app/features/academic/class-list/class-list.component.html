<app-fw-page-shell
  title="Gestion des Classes"
  [description]="'Année Active : ' + (currentYear()?.label || '...') + ' • Configurez les instances physiques de classes.'"
  [icon]="School"
  density="compact"
>
  <!-- CONTENU DE PAGE ALIGNÉ -->
  <div class="list-page-content animate-in fade-in duration-500">
    
    <!-- BARRE DE COMMANDE UNIFIÉE -->
    <app-fw-list-command-bar
      [searchQuery]="searchQuery()"
      [searchPlaceholder]="'Rechercher une classe...'"
      [totalElements]="displayClasses().length"
      [activeFilters]="activeFilterChips()"
      (searchChange)="searchQuery.set($event)"
      (clearSearch)="searchQuery.set('')"
      (removeFilter)="removeFilter($event)"
      (clearAllFilters)="clearAllFilters()"
    >
      <!-- ACTIONS PRIMAIRES -->
      <div primary-actions class="flex items-center gap-2">
        <app-fw-button 
          variant="tertiary" 
          size="sm" 
          [icon]="UserCheck" 
          routerLink="/admin/academic/assignments"
        >
          Affectations
        </app-fw-button>

        <div class="divider-v"></div>

        <app-fw-button 
          *fwHasPermission="'academic:structure:write'"
          (click)="openAddClassForm()"
          variant="primary"
          size="sm"
          [icon]="Plus"
        >
          Ouvrir une classe
        </app-fw-button>
      </div>
    </app-fw-list-command-bar>

    <!-- LISTE DES CLASSES -->
    <div class="list-container-integrated">
      <app-data-list
        [data]="displayClasses()"
        [total]="totalElements()"
        [actions]="classActions"
        [isLoading]="isLoading()"
        [showSearch]="false"
        [showFilterButton]="false"
        [cardMode]="false"
        defaultView="table"
        (onAction)="handleClassAction($event)"
      ></app-data-list>
    </div>

  </div>

</app-fw-page-shell>
