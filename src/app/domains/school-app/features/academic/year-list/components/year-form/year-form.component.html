<app-fw-form-shell
  title="Planifier une Rentrée"
  subtitle="Initialisation du calendrier administratif et pédagogique."
  [icon]="Calendar"
  saveLabel="Créer l'année scolaire"
  [isLoading]="isLoading()"
  [canSave]="yearForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="yearForm" class="space-y-10 py-2">
    
    <!-- 1. Identification -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Type" [size]="14"></lucide-icon>
        <span class="label">Identification & Évaluation</span>
      </header>

      <div class="grid grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Libellé de l'année</label>
          <div class="fw-input-wrapper">
            <input type="text" formControlName="label" placeholder="ex: 2025-2026" class="fw-input" [class.error]="isInvalid('label')"/>
          </div>
        </div>

        <div class="fw-field">
          <label class="fw-label">Système d'évaluation</label>
          <div class="fw-input-wrapper">
            <mat-select formControlName="systemType" class="fw-input">
              <mat-option value="TRIMESTER">Trimestriel (3 périodes)</mat-option>
              <mat-option value="SEMESTER">Semestriel (2 périodes)</mat-option>
              <mat-option value="ANNUAL">Annuel (1 période)</mat-option>
            </mat-select>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. Calendrier Administratif -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Calendar" [size]="14"></lucide-icon>
        <span class="label">Dates Administratives</span>
      </header>

      <div class="grid grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Début d'exercice</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="adminStartDate" class="fw-input" [class.error]="isInvalid('adminStartDate')"/>
          </div>
        </div>
        <div class="fw-field">
          <label class="fw-label">Fin d'exercice</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="adminEndDate" class="fw-input" [class.error]="isInvalid('adminEndDate')"/>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. Calendrier Pédagogique -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Clock" [size]="14"></lucide-icon>
        <span class="label">Période des Cours</span>
      </header>

      <div class="grid grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Début des leçons</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="lessonsStartDate" class="fw-input"/>
          </div>
        </div>
        <div class="fw-field">
          <label class="fw-label">Fin des leçons</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="lessonsEndDate" class="fw-input"/>
          </div>
        </div>
      </div>
    </div>

    <!-- Info Box Minimalist -->
    <div class="p-4 bg-surface-sunken rounded-xl border border-border flex items-start gap-3">
      <lucide-icon [name]="Info" [size]="16" class="text-text-tertiary mt-0.5"></lucide-icon>
      <p class="text-[11px] text-text-secondary leading-relaxed font-medium">
        L'année sera créée en état <span class="text-midnight font-bold">PLANNING</span>. L'activation manuelle ultérieure archivera automatiquement la session précédente.
      </p>
    </div>

  </form>
</app-fw-form-shell>
