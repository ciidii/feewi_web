<app-form-shell
  title="Planifier une Rentrée"
  subtitle="Initialisez le calendrier administratif et pédagogique pour la nouvelle année."
  [icon]="Calendar"
  statusLabel="Planning"
  saveLabel="Créer l'année scolaire"
  [isLoading]="isLoading()"
  [canSave]="yearForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="yearForm" class="space-y-8">
    
    <!-- 1. Identification -->
    <div class="space-y-5">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-8 h-8 rounded-xl bg-primary-50 text-primary-600 font-bold text-xs">01</div>
        <span class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Identification</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Libellé de l'année</label>
          <div class="relative group">
            <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400 group-focus-within:text-primary transition-colors">
              <lucide-icon [name]="Type" class="w-4.5 h-4.5"></lucide-icon>
            </div>
            <input type="text" formControlName="label" placeholder="ex: 2025-2026" class="fw-input-field" [class.error]="isInvalid('label')"/>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Système d'évaluation</label>
          <div class="relative group">
            <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400 group-focus-within:text-primary transition-colors z-10">
              <lucide-icon [name]="Clock" class="w-4.5 h-4.5"></lucide-icon>
            </div>
            <mat-select formControlName="systemType" class="fw-select-field">
              <mat-option value="TRIMESTER">Trimestriel (3 périodes)</mat-option>
              <mat-option value="SEMESTER">Semestriel (2 périodes)</mat-option>
              <mat-option value="ANNUAL">Annuel (1 période)</mat-option>
            </mat-select>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. Calendrier Administratif -->
    <div class="space-y-5">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-8 h-8 rounded-xl bg-primary-50 text-primary-600 font-bold text-xs">02</div>
        <span class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Dates Administratives</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1 text-emerald-600">Début d'exercice</label>
          <input type="date" formControlName="adminStartDate" class="fw-input-field" [class.error]="isInvalid('adminStartDate')"/>
        </div>
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1 text-rose-600">Fin d'exercice</label>
          <input type="date" formControlName="adminEndDate" class="fw-input-field" [class.error]="isInvalid('adminEndDate')"/>
        </div>
      </div>
    </div>

    <!-- 3. Calendrier Pédagogique -->
    <div class="space-y-5">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-8 h-8 rounded-xl bg-primary-50 text-primary-600 font-bold text-xs">03</div>
        <span class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Période des Cours</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Début des leçons</label>
          <input type="date" formControlName="lessonsStartDate" class="fw-input-field"/>
        </div>
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Fin des leçons</label>
          <input type="date" formControlName="lessonsEndDate" class="fw-input-field"/>
        </div>
      </div>
    </div>

    <div class="p-4 bg-blue-50 rounded-xl border border-blue-100 flex items-start gap-3">
      <lucide-icon [name]="Info" class="w-4 h-4 text-blue-600 mt-0.5"></lucide-icon>
      <p class="text-[11px] text-blue-800 leading-relaxed">
        Une fois l'année créée, elle sera en état <span class="font-bold">PLANNING</span>. Vous devrez l'activer manuellement pour qu'elle devienne l'année de référence de l'école.
      </p>
    </div>

  </form>
</app-form-shell>
