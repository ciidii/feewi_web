<app-fw-page-shell
  title="Calendrier Académique"
  [description]="richDescription()"
  [icon]="Calendar"
  density="compact"
>
  <!-- BARRE DE COMMANDE UNIFIÉE -->
  <app-fw-list-command-bar
    [searchQuery]="searchQuery()"
    [searchPlaceholder]="'Rechercher une année...'"
    [totalElements]="years().length"
    [activeFilters]="activeFilterChips()"
    (searchChange)="searchQuery.set($event)"
    (clearSearch)="searchQuery.set('')"
    (removeFilter)="removeFilter($event)"
    (clearAllFilters)="clearAllFilters()"
  >
    <!-- ACTIONS PRIMAIRES -->
    <div primary-actions class="flex items-center gap-2">
      <app-fw-button variant="tertiary" size="sm" [icon]="RefreshCw" [loading]="isLoading()" (click)="loadYears()" title="Actualiser"></app-fw-button>
      <div class="divider-v"></div>
      <app-fw-button 
        (click)="openAddYearForm()"
        variant="primary"
        size="sm"
        [icon]="Plus"
      >
        Préparer une rentrée
      </app-fw-button>
    </div>
  </app-fw-list-command-bar>

  <!-- LISTE DES ANNÉES -->
  <div class="list-container-integrated animate-in fade-in duration-500">
    <app-data-list
      [data]="displayYears()"
      [tabs]="tabs"
      [activeTab]="activeTab()"
      [total]="displayYears().length"
      [actions]="yearActions"
      [isLoading]="isLoading()"
      [showSearch]="false"
      [showFilterButton]="false"
      [cardMode]="false"
      defaultView="cards"
      (onTabChange)="onTabChange($event)"
      (onAction)="handleAction($event)"
    ></app-data-list>
  </div>

</app-fw-page-shell>
