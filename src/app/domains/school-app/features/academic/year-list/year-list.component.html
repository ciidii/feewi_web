<app-fw-page-shell
  title="Calendrier Académique"
  description="Gestion des années scolaires et des cycles de vie de l'établissement."
  [icon]="Calendar"
  density="compact"
>
  <!-- ACTIONS -->
  <div actions>
    <button 
      (click)="openAddYearForm()"
      class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-xl text-[13px] font-bold hover:bg-primary-hover transition-all shadow-lg shadow-primary/20 active:scale-95"
    >
      <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
      Préparer une rentrée
    </button>
  </div>

  <!-- LISTE DES ANNÉES -->
  <div class="relative min-h-[400px] animate-in fade-in duration-500">
    <app-data-list
      [data]="displayYears()"
      [tabs]="tabs"
      [activeTab]="activeTab()"
      [total]="displayYears().length"
      [actions]="yearActions"
      [isLoading]="isLoading()"
      defaultView="cards"
      (onTabChange)="onTabChange($event)"
      (onAction)="handleAction($event)"
    ></app-data-list>
  </div>

</app-fw-page-shell>
