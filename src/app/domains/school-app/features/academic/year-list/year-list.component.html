<app-fw-page-shell
  title="Calendrier Académique"
  [description]="richDescription()"
  [icon]="Calendar"
  density="compact"
>
  <!-- ACTIONS -->
  <div actions>
    <app-fw-button 
      (click)="openAddYearForm()"
      variant="primary"
      size="sm"
      [icon]="Plus"
    >
      Préparer une rentrée
    </app-fw-button>
  </div>

  <!-- LISTE DES ANNÉES -->
  <div class="relative min-h-[400px] animate-in fade-in duration-500">
    <app-data-list
      [data]="displayYears()"
      [tabs]="tabs"
      [activeTab]="activeTab()"
      [total]="displayYears().length"
      [actions]="yearActions"
      [isLoading]="isLoading()"
      defaultView="cards"
      (onTabChange)="onTabChange($event)"
      (onAction)="handleAction($event)"
    ></app-data-list>
  </div>

</app-fw-page-shell>
