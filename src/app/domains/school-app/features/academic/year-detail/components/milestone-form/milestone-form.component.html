<app-fw-form-shell
  [title]="isEditMode ? 'Modifier le Jalon' : 'Nouveau Jalon Chronologique'"
  subtitle="Définissez une période clé du calendrier scolaire."
  [icon]="Calendar"
  [saveLabel]="isEditMode ? 'Mettre à jour' : 'Ajouter au calendrier'"
  [isLoading]="isLoading()"
  [canSave]="milestoneForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="milestoneForm" class="space-y-10 py-2">

    <!-- 1. Catégorie -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Type" [size]="14"></lucide-icon>
        <span class="label">Catégorie de Jalon</span>
      </header>

      <div class="fw-field">
        <label class="fw-label">Type d'événement</label>
        <div class="fw-input-wrapper">
          <mat-select formControlName="type" class="fw-input">
            <mat-option *ngFor="let t of milestoneTypes" [value]="t.value">
              <div class="flex items-center gap-2">
                <lucide-icon [name]="t.icon" [size]="14" class="text-slate-400"></lucide-icon>
                <span>{{ t.label }}</span>
              </div>
            </mat-option>
          </mat-select>
        </div>
      </div>
    </div>

    <!-- 2. Identification -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Info" [size]="14"></lucide-icon>
        <span class="label">Identification</span>
      </header>

      <div class="fw-field">
        <label class="fw-label">Nom du jalon (Libellé public)</label>
        <div class="fw-input-wrapper">
          <input type="text" formControlName="label" placeholder="ex: 1er Trimestre, Vacances de Pâques..." class="fw-input" [class.error]="isInvalid('label')"/>
        </div>
      </div>
    </div>

    <!-- 3. Temporalité -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Clock" [size]="14"></lucide-icon>
        <span class="label">Temporalité</span>
      </header>

      <div class="grid grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Date de début</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="startDate" class="fw-input" [class.error]="isInvalid('startDate')"/>
          </div>
        </div>
        <div class="fw-field">
          <label class="fw-label">Date de fin</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="endDate" class="fw-input" [class.error]="isInvalid('endDate')"/>
          </div>
        </div>
      </div>
    </div>

  </form>
</app-fw-form-shell>
