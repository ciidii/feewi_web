<app-fw-form-shell
  [title]="isEditMode ? 'Modifier la Période' : 'Ajouter une Période'"
  [subtitle]="'Définition des dates de cours et d\'examens.'"
  [icon]="ListTodo"
  [saveLabel]="isEditMode ? 'Enregistrer' : 'Ajouter la période'"
  [isLoading]="isLoading()"
  [canSave]="periodForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="periodForm" class="space-y-10 py-2">

    <!-- 1. Identification -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Type" [size]="14"></lucide-icon>
        <span class="label">Identification</span>
      </header>

      <div class="fw-field">
        <label class="fw-label">Libellé de la période</label>
        <div class="fw-input-wrapper">
          <input
            type="text"
            formControlName="label"
            placeholder="Ex: 1er Trimestre"
            class="fw-input"
            [class.error]="isInvalid('label')"
          />
        </div>
      </div>
    </div>

    <!-- 2. Calendrier de Cours -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Calendar" [size]="14"></lucide-icon>
        <span class="label">Dates des Cours</span>
      </header>

      <div class="grid grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Début</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="startDate" class="fw-input" [class.error]="isInvalid('startDate')"/>
          </div>
        </div>
        <div class="fw-field">
          <label class="fw-label">Fin</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="endDate" class="fw-input" [class.error]="isInvalid('endDate')"/>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. Examens & Notes -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="GraduationCap" [size]="14"></lucide-icon>
        <span class="label">Examens & Bilans</span>
      </header>

      <div class="grid grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Début Examens</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="examStartDate" class="fw-input"/>
          </div>
        </div>
        <div class="fw-field">
          <label class="fw-label">Fin Examens</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="examEndDate" class="fw-input"/>
          </div>
        </div>
        <div class="fw-field col-span-2">
          <label class="fw-label">Date limite de saisie des notes</label>
          <div class="fw-input-wrapper">
            <input
              type="date"
              formControlName="gradingDeadline"
              class="fw-input"
              [class.error]="isInvalid('gradingDeadline')"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="p-4 bg-surface-sunken rounded-xl border border-border flex items-start gap-3">
      <lucide-icon [name]="Info" [size]="16" class="text-text-tertiary mt-0.5"></lucide-icon>
      <p class="text-[11px] text-text-secondary leading-relaxed font-medium">
        L'intervalle doit être inclus dans les dates de session : <br/>
        <span class="text-midnight font-bold">{{ formatDate(year()?.startDate) }} au {{ formatDate(year()?.endDate) }}</span>
      </p>
    </div>

  </form>
</app-fw-form-shell>
