<app-fw-form-shell
  [title]="isEditMode ? 'Modifier la période' : 'Nouvelle période'"
  [subtitle]="year().label"
  [icon]="Layers"
  [saveLabel]="isEditMode ? 'Mettre à jour' : 'Créer'"
  [isLoading]="isLoading()"
  [canSave]="periodForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="periodForm" class="space-y-5 py-2">

    <div class="fw-field">
      <label class="fw-label">Libellé</label>
      <div class="fw-input-wrapper">
        <input type="text" formControlName="label"
               placeholder="ex: 1er Trimestre, 2ème Semestre..."
               class="fw-input" [class.error]="isInvalid('label')"/>
      </div>
      <span *ngIf="isInvalid('label')" class="fw-error">Libellé requis.</span>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="fw-field">
        <label class="fw-label">Du</label>
        <div class="fw-input-wrapper">
          <input type="date" formControlName="startDate" class="fw-input" [class.error]="isInvalid('startDate')"/>
        </div>
      </div>
      <div class="fw-field">
        <label class="fw-label">Au</label>
        <div class="fw-input-wrapper">
          <input type="date" formControlName="endDate" class="fw-input" [class.error]="isInvalid('endDate')"/>
        </div>
      </div>
    </div>

  </form>
</app-fw-form-shell>
