<app-fw-form-shell
  [title]="isEditMode ? 'Modifier le Congé' : 'Ajouter un Congé'"
  [subtitle]="'Enregistrement des périodes de fermeture.'"
  [icon]="Palmtree"
  [saveLabel]="isEditMode ? 'Enregistrer' : 'Ajouter au calendrier'"
  [isLoading]="isLoading()"
  [canSave]="holidayForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="holidayForm" class="space-y-10 py-2">
    
    <!-- 1. Identification -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Type" [size]="14"></lucide-icon>
        <span class="label">Information</span>
      </header>

      <div class="fw-field">
        <label class="fw-label">Libellé du congé</label>
        <div class="fw-input-wrapper">
          <input 
            type="text" 
            formControlName="label" 
            placeholder="Ex: Vacances de Noël" 
            class="fw-input"
            [class.error]="isInvalid('label')"
          />
        </div>
      </div>
    </div>

    <!-- 2. Période -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Calendar" [size]="14"></lucide-icon>
        <span class="label">Dates de fermeture</span>
      </header>

      <div class="grid grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Début</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="startDate" class="fw-input" [class.error]="isInvalid('startDate')"/>
          </div>
        </div>
        <div class="fw-field">
          <label class="fw-label">Fin</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="endDate" class="fw-input" [class.error]="isInvalid('endDate')"/>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. Configuration SaaS -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="ShieldCheck" [size]="14"></lucide-icon>
        <span class="label">Impact Opérationnel</span>
      </header>

      <div class="bg-surface-sunken rounded-2xl p-5 border border-border flex items-center justify-between group hover:bg-white hover:border-midnight transition-all cursor-pointer" 
           (click)="holidayForm.get('schoolClosed')?.setValue(!holidayForm.get('schoolClosed')?.value)">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-text-tertiary group-hover:text-rose-500 transition-colors">
            <lucide-icon [name]="XCircle" [size]="18"></lucide-icon>
          </div>
          <div>
            <p class="text-sm font-bold text-midnight">Établissement fermé</p>
            <p class="text-[11px] text-text-secondary">Si activé, les cours seront suspendus pour tous.</p>
          </div>
        </div>
        <mat-slide-toggle 
          color="warn" 
          formControlName="schoolClosed"
          (click)="$event.stopPropagation()"
        ></mat-slide-toggle>
      </div>
    </div>

    <div class="p-4 bg-surface-sunken rounded-xl border border-border flex items-start gap-3">
      <lucide-icon [name]="Info" [size]="16" class="text-text-tertiary mt-0.5"></lucide-icon>
      <p class="text-[11px] text-text-secondary leading-relaxed font-medium">
        L'intervalle doit être inclus dans les dates administratives : <br/>
        <span class="text-midnight font-bold">{{ formatDate(year()?.adminStartDate) }} au {{ formatDate(year()?.adminEndDate) }}</span>
      </p>
    </div>

  </form>
</app-fw-form-shell>
