<app-form-shell
  [title]="isEditMode ? 'Modifier le Congé' : 'Ajouter un Congé'"
  [subtitle]="isEditMode ? 'Rectifiez les dates de fermeture ou le libellé.' : 'Enregistrez des vacances ou un jour férié pour cet établissement.'"
  [icon]="Palmtree"
  statusLabel="Calendrier"
  [saveLabel]="isEditMode ? 'Enregistrer les modifications' : 'Ajouter au calendrier'"
  [isLoading]="isLoading()"
  [canSave]="holidayForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="holidayForm" class="space-y-8">
    
    <!-- 1. Identification -->
    <div class="space-y-5">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-8 h-8 rounded-xl bg-emerald-50 text-emerald-600 font-bold text-xs">01</div>
        <span class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Information</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Libellé du congé</label>
        <div class="relative group">
          <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400 group-focus-within:text-emerald-600 transition-colors">
            <lucide-icon [name]="Type" class="w-4.5 h-4.5"></lucide-icon>
          </div>
          <input 
            type="text" 
            formControlName="label" 
            placeholder="Ex: Vacances de Noël" 
            class="fw-input-field border-emerald-100 focus:border-emerald-500 focus:ring-emerald-50"
            [class.error]="isInvalid('label')"
          />
        </div>
      </div>
    </div>

    <!-- 2. Période -->
    <div class="space-y-5">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-8 h-8 rounded-xl bg-emerald-50 text-emerald-600 font-bold text-xs">02</div>
        <span class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Dates</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Début</label>
          <input type="date" formControlName="startDate" class="fw-input-field" [class.error]="isInvalid('startDate')"/>
        </div>
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Fin</label>
          <input type="date" formControlName="endDate" class="fw-input-field" [class.error]="isInvalid('endDate')"/>
        </div>
      </div>
    </div>

    <!-- 3. Configuration SaaS -->
    <div class="space-y-5">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-8 h-8 rounded-xl bg-emerald-50 text-emerald-600 font-bold text-xs">03</div>
        <span class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Impact sur l'école</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <div class="bg-slate-50 rounded-2xl p-5 border border-slate-100 flex items-center justify-between group hover:bg-white hover:border-emerald-200 transition-all cursor-pointer" (click)="closedToggle.toggle()">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-rose-500">
            <lucide-icon [name]="XCircle" class="w-5 h-5"></lucide-icon>
          </div>
          <div>
            <p class="text-sm font-bold text-slate-900">Établissement fermé</p>
            <p class="text-[11px] text-slate-500">Si activé, les cours seront suspendus pour tous.</p>
          </div>
        </div>
        <mat-slide-toggle 
          #closedToggle
          color="warn" 
          formControlName="schoolClosed"
          (click)="$event.stopPropagation()"
        ></mat-slide-toggle>
      </div>
    </div>

    <div class="p-4 bg-emerald-50 rounded-xl border border-emerald-100 flex items-start gap-3">
      <lucide-icon [name]="Info" class="w-4 h-4 text-emerald-600 mt-0.5"></lucide-icon>
      <p class="text-[11px] text-emerald-800 leading-relaxed font-medium">
        Vérifiez que le congé est inclus dans les dates administratives de l'année scolaire : <br/>
        <span class="font-bold underline">{{ formatDate(year()?.adminStartDate) }} au {{ formatDate(year()?.adminEndDate) }}</span>
      </p>
    </div>

  </form>
</app-form-shell>
