<app-fw-form-shell
  [title]="isEditMode ? 'Modifier le Congé' : 'Nouveau Congé'"
  [subtitle]="'Planifiez une fermeture ou une suspension de cours pour ' + year().label + '.'"
  [icon]="Calendar"
  [saveLabel]="isEditMode ? 'Mettre à jour' : 'Ajouter le congé'"
  [isLoading]="isLoading()"
  [canSave]="holidayForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="holidayForm" class="space-y-8 py-2">

    <!-- 1. Identification -->
    <div class="space-y-4">
      <header class="section-header">
        <lucide-icon [name]="AlertCircle" [size]="14"></lucide-icon>
        <span class="label">Identification</span>
      </header>
      <div class="fw-field">
        <label class="fw-label">Libellé du congé</label>
        <div class="fw-input-wrapper">
          <input type="text" formControlName="label"
                 placeholder="ex: Vacances de Noël, Tabaski, Korité..."
                 class="fw-input" [class.error]="isInvalid('label')"/>
        </div>
        <span *ngIf="isInvalid('label')" class="fw-error">Libellé requis (min. 2 caractères).</span>
      </div>
    </div>

    <!-- 2. Dates -->
    <div class="space-y-4">
      <header class="section-header">
        <lucide-icon [name]="Clock" [size]="14"></lucide-icon>
        <span class="label">Période</span>
      </header>
      <div class="grid grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Du</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="startDate" class="fw-input" [class.error]="isInvalid('startDate')"/>
          </div>
        </div>
        <div class="fw-field">
          <label class="fw-label">Au</label>
          <div class="fw-input-wrapper">
            <input type="date" formControlName="endDate" class="fw-input" [class.error]="isInvalid('endDate')"/>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. Fermeture établissement -->
    <div class="space-y-4">
      <header class="section-header">
        <lucide-icon [name]="AlertCircle" [size]="14"></lucide-icon>
        <span class="label">Type de fermeture</span>
      </header>
      <div class="fw-field">
        <label class="flex items-center gap-3 cursor-pointer group">
          <div class="relative">
            <input type="checkbox" formControlName="schoolClosed" class="sr-only"/>
            <div class="w-10 h-5 rounded-full transition-colors"
                 [class.bg-primary]="holidayForm.get('schoolClosed')?.value"
                 [class.bg-slate-300]="!holidayForm.get('schoolClosed')?.value">
              <div class="absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform"
                   [class.translate-x-5]="holidayForm.get('schoolClosed')?.value"
                   [class.translate-x-0.5]="!holidayForm.get('schoolClosed')?.value">
              </div>
            </div>
          </div>
          <div>
            <p class="text-sm font-medium text-text-primary">Établissement complètement fermé</p>
            <p class="text-[11px] text-text-tertiary">Aucune activité (cours, administration, etc.)</p>
          </div>
        </label>
      </div>
    </div>

  </form>
</app-fw-form-shell>
