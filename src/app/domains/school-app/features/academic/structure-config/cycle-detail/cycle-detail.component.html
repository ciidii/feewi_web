<div class="space-y-8 animate-in fade-in duration-500">
  
  <!-- HEADER & BREADCRUMB -->
  <header class="space-y-6">
    <div class="flex items-center justify-between">
      <div class="space-y-1">
        <a routerLink="/classes" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-primary transition-all group">
          <lucide-icon [name]="ArrowLeft" class="w-3.5 h-3.5 group-hover:-translate-x-1 transition-transform"></lucide-icon>
          Retour à la structure globale
        </a>
        <h1 class="text-3xl font-display font-bold text-midnight tracking-tight italic uppercase">Cockpit du Cycle</h1>
      </div>

      <div class="flex gap-3">
        <!-- Bouton Nouveau Niveau (Onglet Niveaux) -->
        <button 
          *ngIf="canEditStructure() && activeTab() === 'niveaux'"
          (click)="openAddLevel()"
          class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-xl text-[13px] font-bold hover:bg-primary-hover transition-all shadow-lg shadow-primary/20 active:scale-95"
        >
          <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
          Nouveau niveau
        </button>

        <!-- Bouton Nouvelle Filière (Onglet Filières) -->
        <button 
          *ngIf="canEditStructure() && activeTab() === 'filieres'"
          (click)="openAddFiliere()"
          class="flex items-center gap-2 px-5 py-2.5 bg-midnight text-white rounded-xl text-[13px] font-bold hover:bg-slate-800 transition-all shadow-lg shadow-midnight/20 active:scale-95"
        >
          <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
          Nouvelle série / filière
        </button>
      </div>
    </div>

    <!-- BANNIÈRE DE CYCLE (IMMERSIVE) -->
    <div class="relative overflow-hidden bg-white rounded-[2.5rem] border border-slate-200 p-8 shadow-sm group">
      <div class="absolute -right-16 -top-16 w-64 h-64 bg-primary-50 rounded-full blur-3xl opacity-50 group-hover:opacity-100 transition-opacity duration-700"></div>
      
      <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-8">
        <div class="flex items-center gap-6">
          <div class="w-20 h-20 bg-primary-50 rounded-[2rem] flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-all duration-500 shadow-inner">
            <lucide-icon [name]="Layers" class="w-10 h-10"></lucide-icon>
          </div>
          <div class="space-y-1">
            <div class="flex items-center gap-2">
              <span class="px-2 py-0.5 bg-primary-100 text-primary-700 text-[10px] font-bold rounded-md uppercase tracking-wider">Cycle Actif</span>
              <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">{{ cycle()?.code }}</span>
            </div>
            <h2 class="text-4xl font-display font-bold text-slate-900 leading-none italic uppercase">{{ cycle()?.name || '...' }}</h2>
            <p class="text-sm text-slate-500 font-medium">Gestion contextuelle des niveaux et programmes.</p>
          </div>
        </div>

        <div class="flex gap-4">
          <div class="px-6 py-4 bg-slate-50 rounded-3xl border border-slate-100 flex flex-col items-center justify-center min-w-[120px]">
            <span class="text-2xl font-display font-bold text-slate-900">{{ levels().length }}</span>
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Niveaux</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- BARRE D'ONGLETS CONTEXTUELLE -->
  <div *ngIf="hasFilieres()" class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl w-fit">
    <button 
      (click)="setTab('niveaux')"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all"
      [class.bg-white]="activeTab() === 'niveaux'"
      [class.shadow-sm]="activeTab() === 'niveaux'"
      [class.text-primary-600]="activeTab() === 'niveaux'"
      [class.text-slate-500]="activeTab() !== 'niveaux'"
    >
      <lucide-icon [name]="GraduationCap" class="w-3.5 h-3.5"></lucide-icon>
      Niveaux d'études
    </button>
    <button 
      (click)="setTab('filieres')"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all"
      [class.bg-white]="activeTab() === 'filieres'"
      [class.shadow-sm]="activeTab() === 'filieres'"
      [class.text-primary-600]="activeTab() === 'filieres'"
      [class.text-slate-500]="activeTab() !== 'filieres'"
    >
      <lucide-icon [name]="Tag" class="w-3.5 h-3.5"></lucide-icon>
      Séries & Filières
    </button>
  </div>

  <!-- CONTENU DYNAMIQUE (Niveaux ou Filières) -->
  <div class="space-y-4 animate-in slide-in-from-bottom duration-700 delay-200">
    
    <div class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col relative min-h-[400px]">
      
      <!-- Loader -->
      <div *ngIf="isLoading()" class="absolute inset-0 z-10 bg-white/80 backdrop-blur-sm flex items-center justify-center">
        <div class="w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
      </div>

      <!-- Liste des Niveaux -->
      <app-data-list
        *ngIf="activeTab() === 'niveaux'"
        [data]="displayLevels()"
        [total]="displayLevels().length"
        [actions]="levelActions()"
        (onAction)="handleLevelAction($event)"
      ></app-data-list>

      <!-- Liste des Filières -->
      <app-data-list
        *ngIf="activeTab() === 'filieres'"
        [data]="displayFilieres()"
        [total]="displayFilieres().length"
        [actions]="filiereActions"
        (onAction)="handleFiliereAction($event)"
      ></app-data-list>

      <!-- État vide (Niveaux) -->
      <div *ngIf="activeTab() === 'niveaux' && displayLevels().length === 0 && !isLoading()" class="flex-1 flex flex-col items-center justify-center text-center py-20 px-4 space-y-4">
        <div class="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center text-slate-200">
          <lucide-icon [name]="GraduationCap" class="w-10 h-10"></lucide-icon>
        </div>
        <h3 class="text-base font-bold text-slate-900 tracking-tight">Aucun niveau configuré</h3>
        <p class="text-xs text-slate-500 max-w-xs mx-auto mt-1">Ce cycle est actuellement vide. Commencez par définir les années d'études.</p>
      </div>

    </div>
  </div>

</div>
