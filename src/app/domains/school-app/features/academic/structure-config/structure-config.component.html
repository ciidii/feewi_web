<div class="space-y-8 animate-in fade-in duration-500">
  
  <!-- HEADER -->
  <header class="flex justify-between items-end">
    <div class="space-y-1">
      <h1 class="text-3xl font-display font-bold text-midnight tracking-tight italic uppercase">Configuration Structure</h1>
      <p class="text-sm text-slate-medium font-medium">Gérez l'architecture pédagogique globale de votre établissement.</p>
    </div>

    <div class="flex gap-3">
      <button 
        *ngIf="activeTab() === 'cycles' && canEditStructure()"
        (click)="openAddCycle()"
        class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-xl text-[13px] font-bold hover:bg-primary-hover transition-all shadow-lg shadow-primary/20 active:scale-95"
      >
        <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
        Ajouter un cycle
      </button>

      <button 
        *ngIf="activeTab() === 'filieres'"
        (click)="openAddFiliere()"
        class="flex items-center gap-2 px-5 py-2.5 bg-midnight text-white rounded-xl text-[13px] font-bold hover:bg-slate-800 transition-all shadow-lg shadow-midnight/20 active:scale-95"
      >
        <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
        Nouvelle série / filière
      </button>

      <button 
        *ngIf="activeTab() === 'matieres'"
        (click)="openAddSubjectForm()"
        class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 text-white rounded-xl text-[13px] font-bold hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200 active:scale-95"
      >
        <lucide-icon [name]="Plus" class="w-4 h-4"></lucide-icon>
        Ajouter une matière
      </button>
    </div>
  </header>

  <!-- BARRE D'ONGLETS -->
  <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl w-fit">
    <button 
      (click)="setTab('cycles')"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all"
      [class.bg-white]="activeTab() === 'cycles'"
      [class.shadow-sm]="activeTab() === 'cycles'"
      [class.text-primary-600]="activeTab() === 'cycles'"
      [class.text-slate-500]="activeTab() !== 'cycles'"
    >
      <lucide-icon [name]="Layers" class="w-3.5 h-3.5"></lucide-icon>
      Cycles Éducatifs
    </button>
    <button 
      (click)="setTab('filieres')"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all"
      [class.bg-white]="activeTab() === 'filieres'"
      [class.shadow-sm]="activeTab() === 'filieres'"
      [class.text-primary-600]="activeTab() === 'filieres'"
      [class.text-slate-500]="activeTab() !== 'filieres'"
    >
      <lucide-icon [name]="Tag" class="w-3.5 h-3.5"></lucide-icon>
      Séries & Filières
    </button>
    <button 
      (click)="setTab('matieres')"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all"
      [class.bg-white]="activeTab() === 'matieres'"
      [class.shadow-sm]="activeTab() === 'matieres'"
      [class.text-primary-600]="activeTab() === 'matieres'"
      [class.text-slate-500]="activeTab() !== 'matieres'"
    >
      <lucide-icon [name]="BookOpen" class="w-3.5 h-3.5"></lucide-icon>
      Matières
    </button>
  </div>

  <!-- CONTENU DYNAMIQUE -->
  <main class="w-full relative min-h-[400px]">
    
    <!-- État de chargement Main -->
    <div *ngIf="isLoading()" class="absolute inset-0 z-10 bg-slate-50/80 backdrop-blur-sm flex items-center justify-center rounded-3xl">
      <div class="flex flex-col items-center gap-3">
        <div class="w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        <span class="text-[10px] font-bold text-primary uppercase tracking-widest animate-pulse">Chargement...</span>
      </div>
    </div>

    <!-- HUB : GRILLE DES CYCLES -->
    <div *ngIf="activeTab() === 'cycles'" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom duration-500">
      
      <!-- Cartes Cycle -->
      <div 
        *ngFor="let cycle of cycles()"
        (click)="goToCycle(cycle.id)"
        class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm hover:shadow-xl hover:border-primary-200 hover:-translate-y-1 transition-all cursor-pointer group relative overflow-hidden flex flex-col h-56"
      >
        <!-- Décoration de fond -->
        <div class="absolute -right-6 -top-6 w-32 h-32 bg-primary-50 rounded-full blur-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

        <div class="flex items-start justify-between relative z-10">
          <div class="w-14 h-14 bg-primary-50 rounded-2xl flex items-center justify-center text-primary-600 group-hover:bg-primary group-hover:text-white transition-colors shadow-inner">
            <lucide-icon [name]="Layers" class="w-7 h-7"></lucide-icon>
          </div>
          
          <!-- Actions Admin Rapides -->
          <div *ngIf="canEditStructure()" class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button (click)="$event.stopPropagation(); onEditCycle(cycle)" class="w-8 h-8 rounded-xl bg-white hover:bg-slate-100 border border-slate-100 flex items-center justify-center text-slate-400 hover:text-primary transition-colors shadow-sm">
              <lucide-icon [name]="Edit" class="w-4 h-4"></lucide-icon>
            </button>
          </div>
        </div>

        <div class="mt-auto relative z-10 space-y-4">
          <div>
            <h3 class="text-xl font-bold text-slate-900 tracking-tight">{{ cycle.name }}</h3>
            <p class="text-xs text-slate-500 font-medium mt-1">Code Système : {{ cycle.code }}</p>
          </div>
          
          <div class="flex items-center justify-between pt-4 border-t border-slate-100">
            <span class="text-xs font-bold text-primary flex items-center gap-1.5">
              Gérer ce cycle
            </span>
            <lucide-icon [name]="ArrowRight" class="w-4 h-4 text-slate-300 group-hover:text-primary transition-colors group-hover:translate-x-1"></lucide-icon>
          </div>
        </div>
      </div>

      <!-- Vide -->
      <div *ngIf="cycles().length === 0 && !isLoading()" class="col-span-full py-16 text-center border-2 border-dashed border-slate-200 rounded-3xl">
        <p class="text-sm font-bold text-slate-400 italic">Aucun cycle n'est actif pour votre établissement.</p>
      </div>
    </div>

    <!-- FILIERES (DataList Classique) -->
    <div *ngIf="activeTab() === 'filieres'" class="animate-in fade-in slide-in-from-right duration-300">
      <app-data-list
        [data]="displayFilieres()"
        [total]="displayFilieres().length"
        [actions]="filiereActions"
        (onAction)="handleFiliereAction($event)"
      ></app-data-list>
    </div>

    <!-- MATIERES (DataList Classique) -->
    <div *ngIf="activeTab() === 'matieres'" class="animate-in fade-in slide-in-from-right duration-300">
      <app-data-list
        [data]="displaySubjects()"
        [total]="displaySubjects().length"
        [actions]="subjectActions"
        (onAction)="handleSubjectAction($event)"
      ></app-data-list>
    </div>

  </main>
</div>
