<app-form-shell
  [title]="isEditMode ? 'Modifier le Niveau' : 'Ajouter un Niveau'"
  [subtitle]="isEditMode ? 'Mise à jour des paramètres de l\'échelon pédagogique.' : 'Définissez un nouvel échelon pédagogique dans votre établissement.'"
  [icon]="GraduationCap"
  statusLabel="Référentiel"
  [saveLabel]="isEditMode ? 'Enregistrer les modifications' : 'Enregistrer le niveau'"
  [isLoading]="isLoading()"
  [canSave]="levelForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="levelForm" class="space-y-8">

    <!-- Identification du Niveau -->
    <div class="space-y-5">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-8 h-8 rounded-xl bg-primary-50 text-primary-600 font-bold text-xs">01</div>
        <span class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Paramètres de base</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Nom du Niveau -->
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Nom du niveau</label>
          <div class="relative">
            <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400">
              <lucide-icon [name]="Type" class="w-4 h-4"></lucide-icon>
            </div>
            <input
              type="text"
              formControlName="name"
              placeholder="Ex: CM2 ou 6ème"
              class="w-full h-12 bg-white border border-slate-200 rounded-xl pl-12 pr-4 text-sm font-medium focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all outline-none"
              [class.border-rose-300]="isInvalid('name')"
            />
          </div>
        </div>

        <!-- Rang de progression -->
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Rang (Ordre)</label>
          <div class="relative">
            <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400">
              <lucide-icon [name]="Hash" class="w-4 h-4"></lucide-icon>
            </div>
            <input
              type="number"
              formControlName="rank"
              class="w-full h-12 bg-white border border-slate-200 rounded-xl pl-12 pr-4 text-sm font-medium focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all outline-none"
              [class.border-rose-300]="isInvalid('rank')"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Rattachement -->
    <div class="space-y-5">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-8 h-8 rounded-xl bg-primary-50 text-primary-600 font-bold text-xs">02</div>
        <span class="text-sm font-semibold text-slate-700 uppercase tracking-wider">Cycle Éducatif</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Associer à un cycle</label>
        <div class="relative">
          <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400 z-10">
            <lucide-icon [name]="Layers" class="w-4 h-4"></lucide-icon>
          </div>
          <mat-select
            formControlName="cycleId"
            placeholder="Sélectionner le cycle"
            class="fw-select-field"
            [class.error]="isInvalid('cycleId')"
          >
            <mat-option *ngFor="let cycle of cycles()" [value]="cycle.id">
              {{ cycle.name }}
            </mat-option>
          </mat-select>
        </div>
      </div>
    </div>

    <!-- Info Box -->
    <div class="p-4 bg-primary-50/50 rounded-xl border border-primary-100 flex items-start gap-3">
      <lucide-icon [name]="Info" class="w-4 h-4 text-primary-600 mt-0.5"></lucide-icon>
      <p class="text-xs text-primary-800 leading-relaxed font-medium">
        Le <span class="font-bold">rang</span> détermine l'ordre dans lequel les élèves progressent. Un élève passera du rang 1 vers le rang 2 lors du changement d'année.
      </p>
    </div>

  </form>
</app-form-shell>
