<app-form-shell
  [title]="isEditMode ? 'Modifier la Série' : 'Nouvelle Série / Filière'"
  [subtitle]="isEditMode ? 'Rectifiez le nom ou le code technique.' : 'Créez une spécialisation (ex: S1, L1, G) pour vos niveaux du Lycée.'"
  [icon]="BookOpen"
  statusLabel="Référentiel"
  [saveLabel]="isEditMode ? 'Enregistrer les modifications' : 'Créer la série'"
  [isLoading]="isLoading()"
  [canSave]="filiereForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="filiereForm" class="space-y-8">
    
    <div class="space-y-6">
      <!-- Nom de la Filière -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Nom complet</label>
        <div class="relative group">
          <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [name]="Type" class="w-4.5 h-4.5"></lucide-icon>
          </div>
          <input 
            type="text" 
            formControlName="name" 
            placeholder="Ex: Sciences Exactes" 
            class="fw-input-field"
            [class.error]="isInvalid('name')"
          />
        </div>
      </div>

      <!-- Code technique -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Code court (Série)</label>
        <div class="relative group">
          <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400 group-focus-within:text-primary transition-colors">
            <lucide-icon [name]="Tag" class="w-4.5 h-4.5"></lucide-icon>
          </div>
          <input 
            type="text" 
            formControlName="code" 
            placeholder="Ex: S1" 
            class="fw-input-field uppercase"
            [class.error]="isInvalid('code')"
          />
        </div>
        <p class="text-[10px] text-slate-400 font-medium ml-1 italic">Ce code apparaîtra sur les bulletins et certificats.</p>
      </div>
    </div>

    <!-- Info Box -->
    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200 flex items-start gap-3">
      <lucide-icon [name]="Info" class="w-4 h-4 text-slate-400 mt-0.5"></lucide-icon>
      <p class="text-[11px] text-slate-500 leading-relaxed font-medium">
        Les filières sont globales à l'établissement. Une fois créée, une série peut être rattachée à plusieurs niveaux (ex: Terminale S1, Première S1).
      </p>
    </div>

  </form>
</app-form-shell>
