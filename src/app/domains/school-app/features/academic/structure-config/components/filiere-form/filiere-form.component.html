<app-fw-form-shell
  [title]="isEditMode ? 'Modifier la Série' : 'Nouvelle Série / Filière'"
  [subtitle]="isEditMode ? 'Rectifiez le nom ou le code technique.' : 'Créez une spécialisation (ex: S1, L1, G).'"
  [icon]="BookOpen"
  statusLabel="Référentiel"
  [saveLabel]="isEditMode ? 'Enregistrer' : 'Créer la série'"
  [isLoading]="isLoading()"
  [canSave]="filiereForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="filiereForm" class="space-y-4">
    
    <!-- Nom de la Filière -->
    <div class="fw-field">
      <label class="fw-label">Nom complet <span class="required">*</span></label>
      <input 
        type="text" 
        formControlName="name" 
        placeholder="Ex: Sciences Exactes" 
        class="fw-input"
        [class.error]="isInvalid('name')"
      />
      <div *ngIf="isInvalid('name')" class="fw-error">
        <lucide-icon [name]="Info" [size]="12"></lucide-icon>
        <span>Champ obligatoire (min. 3 caractères).</span>
      </div>
    </div>

    <!-- Code technique -->
    <div class="fw-field">
      <label class="fw-label">Code court (Série) <span class="required">*</span></label>
      <input 
        type="text" 
        formControlName="code" 
        placeholder="Ex: S1" 
        class="fw-input uppercase"
        [class.error]="isInvalid('code')"
      />
      <p class="fw-hint">Ce code apparaîtra sur les bulletins et certificats.</p>
    </div>

    <!-- Info Box Standardisée -->
    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200 flex items-start gap-3 mt-6">
      <lucide-icon [name]="Info" class="w-4 h-4 text-primary mt-0.5"></lucide-icon>
      <p class="text-xs text-slate-500 leading-relaxed font-medium">
        Les filières sont globales à l'établissement. Une fois créée, une série peut être rattachée à plusieurs niveaux (ex: Terminale S1, Première S1).
      </p>
    </div>

  </form>
</app-fw-form-shell>
