<app-fw-form-shell
  [title]="isEditMode ? 'Modifier le Cycle' : 'Nouveau Cycle Éducatif'"
  [subtitle]="isEditMode ? 'Mise à jour des paramètres du bloc pédagogique.' : 'Définissez un grand bloc d\'organisation pédagogique.'"
  [icon]="Layers"
  statusLabel="Structure"
  [saveLabel]="isEditMode ? 'Enregistrer' : 'Créer le cycle'"
  [isLoading]="isLoading()"
  [canSave]="cycleForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="cycleForm" class="space-y-4">

    <!-- Nom du Cycle -->
    <div class="fw-field">
      <label class="fw-label">Dénomination du cycle <span class="required">*</span></label>
      <input
        type="text"
        formControlName="name"
        placeholder="Ex: Enseignement Moyen"
        class="fw-input"
        [class.error]="isInvalid('name')"
      />
      <p class="fw-hint">Le nom qui apparaîtra sur les bulletins et certificats.</p>
      <div *ngIf="isInvalid('name')" class="fw-error">
        <lucide-icon [name]="Info" [size]="12"></lucide-icon>
        <span>Le nom doit comporter au moins 3 caractères.</span>
      </div>
    </div>

    <!-- Rang d'affichage -->
    <div class="fw-field">
      <label class="fw-label">Ordre d'affichage (Rang)</label>
      <input
        type="number"
        formControlName="rank"
        class="fw-input"
        [class.error]="isInvalid('rank')"
      />
      <p class="fw-hint">Définit la position dans les listes (1 = premier).</p>
    </div>

    <!-- Info Box Standardisée -->
    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200 flex items-start gap-3 mt-6">
      <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center border border-slate-100 shrink-0 shadow-sm">
        <lucide-icon [name]="Info" class="w-4 h-4 text-primary"></lucide-icon>
      </div>
      <p class="text-xs text-slate-500 leading-relaxed font-medium">
        Les <span class="font-bold text-slate-700">cycles</span> permettent de regrouper vos niveaux. Par exemple, le cycle "Lycée" regroupera Seconde, Première et Terminale.
      </p>
    </div>

  </form>
</app-fw-form-shell>
