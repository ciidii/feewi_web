<app-fw-page-shell
  title="Bibliothèque des Matières"
  description="Gérez le catalogue global des enseignements de votre établissement."
  [icon]="BookOpen"
  density="compact"
>
  <!-- CONTENU DE PAGE ALIGNÉ -->
  <div class="list-page-content animate-in fade-in duration-500">

    <!-- BARRE DE COMMANDE UNIFIÉE -->
    <app-fw-list-command-bar
      [searchQuery]="searchQuery()"
      [searchPlaceholder]="'Rechercher une matière...'"
      [totalElements]="subjects().length"
      [activeFilters]="activeFilterChips()"
      (searchChange)="onSearch($event)"
      (clearSearch)="onSearch('')"
      (removeFilter)="removeFilter($event)"
      (clearAllFilters)="clearAllFilters()"
    >
      <!-- ACTIONS PRIMAIRES -->
      <div primary-actions class="flex items-center gap-2">
        <app-fw-button variant="tertiary" size="sm" [icon]="RefreshCw" [loading]="isLoading()" (click)="loadData()" title="Actualiser"></app-fw-button>
        <div class="divider-v"></div>
        <app-fw-button 
          (click)="openSubjectForm()"
          variant="primary"
          size="sm"
          [icon]="Plus"
        >
          Nouvelle Matière
        </app-fw-button>
      </div>
    </app-fw-list-command-bar>

    <!-- LISTE DES MATIÈRES -->
    <div class="list-container-integrated">
      <app-data-list
        [data]="displaySubjects()"
        [total]="displaySubjects().length"
        [actions]="subjectActions"
        [isLoading]="isLoading()"
        [showSearch]="false"
        [showFilterButton]="false"
        [cardMode]="false"
        (onAction)="handleAction($event)"
      ></app-data-list>

      <!-- État vide -->
      <div *ngIf="displaySubjects().length === 0 && !isLoading()" class="py-24">
        <app-fw-empty-state
          [icon]="BookOpen"
          title="Aucune matière trouvée"
          description="Enrichissez votre catalogue global pour construire vos programmes scolaires."
          ctaLabel="Créer ma première matière"
          (ctaClick)="openSubjectForm()"
        ></app-fw-empty-state>
      </div>
    </div>

  </div>
</app-fw-page-shell>
