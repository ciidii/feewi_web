<div class="feewi-page-container">
  
  <!-- Header de Page -->
  <header class="feewi-page-header">
    <div class="header-left">
      <h1 class="page-title">Gestion des Admissions</h1>
      <p class="page-subtitle">Suivez et validez les dossiers d'inscription des nouveaux élèves.</p>
    </div>
    <div class="header-actions">
      <button class="btn-action primary" routerLink="/admin/admissions/direct">
        <lucide-icon [name]="UserPlus" [size]="18"></lucide-icon>
        <span>Saisie au guichet</span>
      </button>

      <div class="search-field">
        <lucide-icon [name]="Search" [size]="18"></lucide-icon>
        <input 
          type="text" 
          placeholder="Référence, Nom du candidat..." 
          (input)="onSearchChange($event)"
          [value]="searchQuery()">
      </div>
      
      <button class="btn-action" (click)="loadAdmissions()" [disabled]="isLoading()">
        <lucide-icon [name]="RefreshCw" [size]="18" [class.animate-spin]="isLoading()"></lucide-icon>
        <span>Actualiser</span>
      </button>

      <button class="btn-action" title="Exporter les données">
        <lucide-icon [name]="Download" [size]="18"></lucide-icon>
      </button>
    </div>
  </header>

  <!-- Filtres & Liste -->
  <div class="page-content">
    
    <app-data-list
      [data]="admissionRows()"
      [tabs]="admissionTabs()"
      [activeTab]="activeTab()"
      [actions]="admissionActions"
      [isLoading]="isLoading()"
      [page]="currentPage()"
      [total]="totalElements()"
      [totalPages]="totalPages()"
      defaultView="table"
      (onTabChange)="onTabChange($event)"
      (onPageChange)="onPageChange($event)"
      (onAction)="handleAction($event)"
      (onRowClick)="handleAction({ actionId: 'view', row: $event })"
    ></app-data-list>

  </div>

</div>
