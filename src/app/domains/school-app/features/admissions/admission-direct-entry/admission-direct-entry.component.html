<app-fw-page-shell
  title="Saisie Directe au Guichet"
  description="Enregistrement express d'un nouveau candidat par le secrétariat."
  [icon]="UserPlus"
  [backLink]="['/admin/admissions/list']"
  density="compact"
>
  <!-- ACTIONS -->
  <div actions class="flex items-center gap-3">
    <app-fw-button variant="tertiary" size="md" [icon]="X" routerLink="/admin/admissions/list">
      Annuler
    </app-fw-button>
    <app-fw-button variant="primary" size="md" [icon]="Save" [loading]="isSaving()" (click)="onSave()">
      Valider l'inscription
    </app-fw-button>
  </div>

  <!-- FORM CONTENT -->
  <main class="entry-content animate-in fade-in duration-700" *ngIf="!isLoading(); else skeletons">
    <form [formGroup]="entryForm" class="grid grid-cols-12 gap-8">
      
      <!-- PILIER : ORIENTATION & SCOLARITÉ -->
      <div class="col-span-12 lg:col-span-3 space-y-6">
        <section class="zen-form-card">
          <header class="card-header">
            <lucide-icon [name]="School"></lucide-icon>
            <h3>Scolarité</h3>
          </header>
          <div class="card-body space-y-5">
            <div class="form-group">
              <label>Année Scolaire</label>
              <div class="readonly-pill">{{ activeYear()?.label || '...' }}</div>
            </div>
            <div class="form-group">
              <label>Niveau demandé *</label>
              <select formControlName="levelId" class="zen-select highlight">
                <option value="">Sélectionner...</option>
                <option *ngFor="let lvl of levels()" [value]="lvl.id">{{ lvl.name }}</option>
              </select>
            </div>
            <div class="form-group">
              <label>Dernier établissement</label>
              <input type="text" formControlName="previousSchool" class="zen-input" placeholder="École d'origine">
            </div>
          </div>
        </section>

        <!-- PILIER MÉDICAL (Express) -->
        <section class="zen-form-card" formGroupName="medical">
          <header class="card-header">
            <lucide-icon [name]="HeartPulse"></lucide-icon>
            <h3>Santé</h3>
          </header>
          <div class="card-body space-y-5">
            <div class="form-group">
              <label>Groupe Sanguin</label>
              <select formControlName="bloodGroup" class="zen-select">
                <option value="">Inconnu</option>
                <option value="O+">O+</option><option value="O-">O-</option>
                <option value="A+">A+</option><option value="A-">A-</option>
                <option value="B+">B+</option><option value="B-">B-</option>
                <option value="AB+">AB+</option><option value="AB-">AB-</option>
              </select>
            </div>
            <div class="form-group">
              <label>Allergies Critiques</label>
              <textarea formControlName="criticalAllergies" rows="2" class="zen-textarea" placeholder="Détails importants..."></textarea>
            </div>
          </div>
        </section>
      </div>

      <!-- PILIER : FAMILLE -->
      <div class="col-span-12 lg:col-span-4 space-y-6" formGroupName="family">
        <section class="zen-form-card">
          <header class="card-header">
            <lucide-icon [name]="Users"></lucide-icon>
            <h3>Famille & Responsable</h3>
          </header>
          <div class="card-body space-y-5" formGroupName="primaryGuardian">
            <div class="grid grid-cols-2 gap-4">
              <div class="form-group">
                <label>Nom *</label>
                <input type="text" formControlName="lastName" class="zen-input">
              </div>
              <div class="form-group">
                <label>Prénom *</label>
                <input type="text" formControlName="firstName" class="zen-input">
              </div>
            </div>
            <div class="form-group">
              <label>Lien de parenté *</label>
              <select formControlName="relation" class="zen-select">
                <option value="FATHER">Père</option>
                <option value="MOTHER">Mère</option>
                <option value="GUARDIAN">Tuteur Légal</option>
              </select>
            </div>
            <div class="form-group">
              <label>Téléphone *</label>
              <input type="tel" formControlName="phone" class="zen-input" placeholder="+221 ...">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" formControlName="email" class="zen-input" placeholder="parent@mail.com">
            </div>
            <div class="form-group">
              <label>Adresse Physique *</label>
              <input type="text" formControlName="homeAddress" class="zen-input" placeholder="Ville, Quartier">
            </div>
          </div>
        </section>
      </div>

      <!-- PILIER : IDENTITÉ ENFANT -->
      <div class="col-span-12 lg:col-span-5 space-y-6" formGroupName="identity">
        <section class="zen-form-card identity-border">
          <header class="card-header">
            <lucide-icon [name]="User"></lucide-icon>
            <h3>Identité du Candidat</h3>
          </header>
          <div class="card-body grid grid-cols-2 gap-x-6 gap-y-5">
            <div class="form-group">
              <label>Nom de famille *</label>
              <input type="text" formControlName="lastName" class="zen-input">
            </div>
            <div class="form-group">
              <label>Prénoms *</label>
              <input type="text" formControlName="firstName" class="zen-input">
            </div>
            <div class="form-group">
              <label>Sexe / Genre *</label>
              <select formControlName="gender" class="zen-select">
                <option value="MALE">Masculin</option>
                <option value="FEMALE">Féminin</option>
              </select>
            </div>
            <div class="form-group">
              <label>Date de naissance *</label>
              <input type="date" formControlName="birthDate" class="zen-input">
            </div>
            <div class="form-group">
              <label>Lieu de naissance *</label>
              <input type="text" formControlName="birthPlace" class="zen-input">
            </div>
            <div class="form-group">
              <label>Nationalité *</label>
              <input type="text" formControlName="nationality" class="zen-input">
            </div>
          </div>
        </section>

        <div class="guichet-info-card">
          <lucide-icon [name]="ShieldCheck" class="text-primary"></lucide-icon>
          <div class="info-content">
            <p><strong>Mode Saisie Directe :</strong> Ce dossier sera créé immédiatement en état vérifiable. Les documents pourront être numérisés ultérieurement.</p>
          </div>
        </div>
      </div>

    </form>
  </main>

</app-fw-page-shell>

<ng-template #skeletons>
  <div class="grid grid-cols-12 gap-8 animate-pulse">
    <div class="col-span-3 space-y-6">
      <div class="h-64 bg-white rounded-3xl"></div>
      <div class="h-48 bg-white rounded-3xl"></div>
    </div>
    <div class="col-span-4 h-full bg-white rounded-3xl"></div>
    <div class="col-span-5 space-y-6">
      <div class="h-96 bg-white rounded-3xl"></div>
      <div class="h-24 bg-slate-100 rounded-2xl"></div>
    </div>
  </div>
</ng-template>
