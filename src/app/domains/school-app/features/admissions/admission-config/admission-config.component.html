<app-form-shell
  title="Paramètres du Portail d'Admission"
  [subtitle]="'Pilotez l\'ouverture du portail public et configurez les exigences du dossier' + (activeYear() ? ' pour l\'année ' + activeYear()?.label : '')"
  [icon]="Globe"
  statusLabel="Pilotage"
  saveLabel="Enregistrer les modifications"
  cancelLabel="Aperçu"
  [isLoading]="isSaving()"
  [canSave]="config() !== null"
  (save)="onSave()"
  (cancel)="previewPortal()"
>
  <div class="config-split-layout" *ngIf="config(); let cfg">
    
    <!-- COLONNE GAUCHE : RÉGLAGES -->
    <div class="settings-column">
      
      <!-- DISPONIBILITÉ -->
      <section class="config-card">
        <div class="card-header">
          <lucide-icon [name]="Globe" [size]="20" class="text-primary"></lucide-icon>
          <h2>Disponibilité du Service</h2>
        </div>
        <div class="status-control">
          <div class="status-info">
            <span class="status-badge" [class.open]="cfg.isPublicPortalOpen">
              {{ cfg.isPublicPortalOpen ? 'OUVERT AUX INSCRIPTIONS' : 'FERMÉ' }}
            </span>
          </div>
          <button class="btn-toggle" [class.active]="cfg.isPublicPortalOpen" (click)="togglePortal()">
            <div class="toggle-track"><div class="toggle-thumb"></div></div>
            <span>{{ cfg.isPublicPortalOpen ? 'Désactiver' : 'Activer' }}</span>
          </button>
        </div>
      </section>

      <!-- SERVICES -->
      <section class="config-card">
        <div class="card-header">
          <lucide-icon [name]="ChefHat" [size]="20" class="text-primary"></lucide-icon>
          <h2>Services Optionnels</h2>
        </div>
        <div class="services-toggle-list">
          <div class="service-item">
            <div class="service-info">
              <lucide-icon [name]="ChefHat" [size]="16"></lucide-icon>
              <span>Cantine scolaire</span>
            </div>
            <mat-checkbox color="primary" [checked]="isServiceEnabled('CANTEEN')" (change)="toggleService('CANTEEN')"></mat-checkbox>
          </div>
          <div class="service-item">
            <div class="service-info">
              <lucide-icon [name]="Bus" [size]="16"></lucide-icon>
              <span>Transport scolaire</span>
            </div>
            <mat-checkbox color="primary" [checked]="isServiceEnabled('TRANSPORT')" (change)="toggleService('TRANSPORT')"></mat-checkbox>
          </div>
        </div>
      </section>

      <!-- PÉRIODE -->
      <section class="config-card" *ngIf="cfg.admissionWindow">
        <div class="card-header">
          <lucide-icon [name]="Calendar" [size]="20" class="text-primary"></lucide-icon>
          <h2>Fenêtre Temporelle</h2>
        </div>
        <div class="date-inputs">
          <div class="form-group">
            <label>Ouverture</label>
            <input type="date" [(ngModel)]="cfg.admissionWindow.startDate" class="fw-input">
          </div>
          <div class="form-group">
            <label>Fermeture</label>
            <input type="date" [(ngModel)]="cfg.admissionWindow.endDate" class="fw-input">
          </div>
        </div>
      </section>

      <!-- CHECKLIST -->
      <section class="config-card">
        <div class="card-header">
          <lucide-icon [name]="FileText" [size]="20" class="text-primary"></lucide-icon>
          <h2>Checklist Documents</h2>
        </div>
        <div class="docs-grid-config">
          <div *ngFor="let doc of cfg.documentChecklist" class="doc-config-row">
            <div class="doc-main-info">
              <span class="doc-name text-xs">{{ doc.name }}</span>
              <span class="doc-code-tag">{{ doc.code }}</span>
            </div>
            <div class="doc-actions-config">
              <mat-checkbox color="primary" [checked]="doc.mandatory" (change)="updateDocumentMandatory(doc.code, !doc.mandatory)"></mat-checkbox>
              <button class="btn-icon-danger-sm" (click)="removeDocumentType(doc.code)"><lucide-icon [name]="Trash2" [size]="14"></lucide-icon></button>
            </div>
          </div>
        </div>
        <button class="btn-text-action mt-4" (click)="addDocumentType()"><lucide-icon [name]="Plus" [size]="14"></lucide-icon> Ajouter un document</button>
      </section>

    </div>

    <!-- COLONNE DROITE : LIVE PREVIEW (Simulateur) -->
    <div class="preview-column">
      <div class="sticky-top">
        <div class="preview-header-label">Aperçu en temps réel</div>
        <app-portal-preview [config]="cfg" [activeYear]="activeYear()"></app-portal-preview>
      </div>
    </div>

  </div>

  <!-- LOADER INITIAL -->
  <div class="loading-overlay" *ngIf="isLoading()">
    <lucide-icon [name]="RefreshCw" [size]="48" class="animate-spin text-primary"></lucide-icon>
    <p>Synchronisation avec le serveur...</p>
  </div>
</app-form-shell>
