<app-form-shell
  title="Ajouter une Question"
  subtitle="Créez un nouveau champ de saisie personnalisé pour le formulaire d'admission."
  [icon]="MessageSquare"
  saveLabel="Ajouter le champ"
  cancelLabel="Annuler"
  [canSave]="fieldForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="fieldForm" class="space-y-6">
    
    <!-- Libellé de la question -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Libellé de la question</label>
      <div class="relative group">
        <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400 group-focus-within:text-primary transition-colors">
          <lucide-icon [name]="Type" class="w-4.5 h-4.5"></lucide-icon>
        </div>
        <input 
          type="text" 
          formControlName="label" 
          placeholder="Ex: Allergies alimentaires de l'enfant ?" 
          class="fw-input-field"
          [class.error]="isInvalid('label')"
        />
      </div>
    </div>

    <!-- Type de réponse -->
    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Type de réponse</label>
        <select formControlName="type" class="fw-input-field">
          <option value="TEXT">Texte court</option>
          <option value="NUMBER">Nombre</option>
          <option value="DATE">Date</option>
          <option value="BOOLEAN">Case à cocher (Oui/Non)</option>
        </select>
      </div>

      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Placeholder / Aide</label>
        <input 
          type="text" 
          formControlName="placeholder" 
          placeholder="Ex: Précisez ici..." 
          class="fw-input-field"
        />
      </div>
    </div>

    <!-- Option Obligatoire -->
    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <lucide-icon [name]="Info" class="w-4 h-4 text-slate-400"></lucide-icon>
        <span class="text-sm font-semibold text-slate-700">Rendre cette réponse obligatoire</span>
      </div>
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" formControlName="mandatory" class="sr-only peer">
        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
      </label>
    </div>

  </form>
</app-form-shell>
