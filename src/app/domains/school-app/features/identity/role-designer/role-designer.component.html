<app-fw-page-shell
  title="Rôles & Permissions"
  description="Matrice de contrôle d'accès • Configuration sécurisée"
  [icon]="ShieldCheck"
  density="compact"
>
  <!-- ACTIONS DE PAGE -->
  <div actions class="flex items-center gap-2">
    <app-fw-button
      (click)="savePermissions()"
      [disabled]="isSaving() || isInitialLoading() || !hasUnsavedChanges()"
      variant="primary"
      size="sm"
      [icon]="Save"
      [loading]="isSaving()"
    >
      Publier les changements
    </app-fw-button>

    <div class="divider-v"></div>

    <app-fw-button
      (click)="openAddRoleForm()"
      [disabled]="isInitialLoading()"
      variant="tertiary"
      size="sm"
      [icon]="Plus"
    >
      Nouveau rôle
    </app-fw-button>
  </div>

  <!-- CONTENU DE PAGE -->
  <div class="list-page-content animate-in fade-in duration-700">
    
    <div class="launchpad-grid">
      <!-- COLONNE GAUCHE : LISTE DES RÔLES -->
      <aside class="conformity-sidebar overflow-y-auto">
        <header class="section-header-minimal mb-6">
          <lucide-icon [name]="Users" [size]="14" class="text-text-tertiary"></lucide-icon>
          <span class="label">Profils Disponibles</span>
        </header>

        <!-- SKELETON : Liste des rôles -->
        <div *ngIf="isInitialLoading()" class="space-y-3">
          <div *ngFor="let i of [1,2,3,4]" class="h-16 w-full bg-white rounded-xl animate-pulse border border-border-subtle"></div>
        </div>

        <!-- Liste réelle des rôles -->
        <div *ngIf="!isInitialLoading()" class="space-y-2">
          <div
            *ngFor="let role of roles()"
            (click)="selectRole(role.id)"
            class="group relative flex items-center justify-between p-3 rounded-xl border-2 cursor-pointer transition-all duration-200"
            [class.border-transparent]="selectedRoleId() !== role.id"
            [class.bg-white]="selectedRoleId() !== role.id"
            [class.border-midnight]="selectedRoleId() === role.id"
            [class.bg-midnight]="selectedRoleId() === role.id"
            [class.text-white]="selectedRoleId() === role.id"
            [class.shadow-md]="selectedRoleId() === role.id"
          >
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center transition-all"
                   [class.bg-white/10]="selectedRoleId() === role.id"
                   [class.bg-surface-sunken]="selectedRoleId() !== role.id"
                   [class.text-white]="selectedRoleId() === role.id"
                   [class.text-text-tertiary]="selectedRoleId() !== role.id"
              >
                <lucide-icon [name]="role.icon" [size]="16"></lucide-icon>
              </div>
              <div class="flex flex-col min-w-0">
                <span class="text-xs font-bold truncate tracking-tight uppercase">{{ role.name }}</span>
                <span class="text-[9px] font-medium opacity-60 uppercase">{{ role.memberCount }} membre(s)</span>
              </div>
            </div>
            <lucide-icon [name]="ChevronRight" [size]="14" class="opacity-30"></lucide-icon>
          </div>
        </div>
      </aside>

      <!-- COLONNE DROITE : MATRICE -->
      <main class="main-column h-[calc(100vh-140px)] overflow-hidden flex flex-col">
        
        <!-- SKELETON : Matrice -->
        <div *ngIf="isInitialLoading()" class="bg-white rounded-2xl border border-border-subtle p-8 space-y-8 flex-1">
          <div class="h-12 w-1/3 bg-surface-sunken rounded animate-pulse"></div>
          <div class="grid grid-cols-2 gap-6">
            <div *ngFor="let i of [1,2,3,4,5,6]" class="h-20 bg-surface-sunken rounded-xl animate-pulse"></div>
          </div>
        </div>

        <!-- Matrice Réelle -->
        <div *ngIf="!isInitialLoading() && selectedRole()" class="flex-1 flex flex-col bg-white rounded-2xl border border-border-subtle shadow-sm overflow-hidden">
          <!-- En-tête du rôle -->
          <div class="p-6 border-b border-border-subtle bg-surface-sunken/30">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center border border-border-subtle shadow-sm">
                <lucide-icon [name]="selectedRole()?.icon || Shield" [size]="24" class="text-midnight"></lucide-icon>
              </div>
              <div class="flex-1">
                <div class="flex items-center gap-3">
                  <h2 class="text-lg font-black text-midnight uppercase tracking-tight">{{ selectedRole()?.name }}</h2>
                  <span *ngIf="hasUnsavedChanges()" class="px-2 py-0.5 bg-amber-100 text-amber-700 rounded text-[9px] font-bold uppercase tracking-widest border border-amber-200">Non publié</span>
                </div>
                <p class="text-xs text-text-tertiary font-medium">{{ selectedRole()?.rawData?.description || 'Configuration des accès pour ce profil' }}</p>
              </div>
            </div>
          </div>

          <!-- Matrice des permissions -->
          <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
            <div *ngFor="let group of permissionGroups()" class="mb-10 last:mb-0">
              <header class="section-header-minimal mb-6">
                <div class="w-1.5 h-4 bg-midnight rounded-full"></div>
                <span class="label">{{ group.category }}</span>
              </header>
              
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div *ngFor="let perm of group.permissions" 
                     class="flex items-center justify-between p-4 bg-white rounded-xl border border-border-subtle hover:border-midnight transition-all group/perm">
                  <div class="flex-1 pr-4">
                    <p class="text-xs font-bold text-midnight tracking-tight">{{ perm.label }}</p>
                    <p class="text-[10px] text-text-tertiary mt-1 leading-relaxed font-medium">{{ perm.description }}</p>
                  </div>
                  
                  <div class="relative inline-flex items-center cursor-pointer" (click)="onPermissionToggle(perm.id, !perm.granted)">
                    <div class="w-10 h-5 bg-slate-100 rounded-full transition-colors duration-200 border border-border"
                         [class.bg-midnight]="perm.granted"
                         [class.border-midnight]="perm.granted"></div>
                    <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full transition-transform duration-200 shadow-sm"
                         [class.translate-x-5]="perm.granted"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

  </div>
</app-fw-page-shell>
