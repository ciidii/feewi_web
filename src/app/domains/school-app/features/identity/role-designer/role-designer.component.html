<div class="config-feature-root" *ngIf="!isInitialLoading() || roles().length > 0">

  <!-- SIDEBAR DES RÔLES (Master) -->
  <aside class="scope-sidebar">
    
    <!-- Brand header -->
    <div class="sidebar-header">
      <div class="sidebar-brand-icon">
        <lucide-icon [name]="ShieldCheck" [size]="14"></lucide-icon>
      </div>
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">Contrôle d'Accès</span>
        <span class="sidebar-brand-year">Gouvernance SaaS</span>
      </div>
    </div>

    <!-- Section : Profils Utilisateurs -->
    <div class="nav-section-title">
      Profils Disponibles
      <span class="level-count">{{ roles().length }}</span>
    </div>

    <div class="levels-scroll">
      <button 
        *ngFor="let role of roles()"
        class="scope-item" 
        [class.active]="selectedRoleId() === role.id" 
        (click)="selectRole(role.id)"
      >
        <div class="scope-icon">
          <lucide-icon [name]="role.icon" [size]="15"></lucide-icon>
        </div>
        <div class="scope-label-wrap">
          <span class="scope-name">{{ role.name }}</span>
          <span class="scope-sub">{{ role.memberCount }} membre(s) rattaché(s)</span>
        </div>
        <!-- Dot if unsaved changes -->
        <div class="override-dot" *ngIf="selectedRoleId() === role.id && hasUnsavedChanges()" title="Changements non publiés"></div>
      </button>
    </div>

    <!-- Actions de création -->
    <div class="nav-divider"></div>
    <div class="px-2">
      <app-fw-button 
        variant="tertiary" 
        size="sm" 
        class="w-full" 
        [icon]="Plus" 
        (click)="openAddRoleForm()"
      >
        Nouveau rôle
      </app-fw-button>
    </div>

  </aside>

  <!-- CONTENU PILOTÉ (Detail Viewport) -->
  <div class="config-viewport">
    <app-fw-page-shell
      [title]="'Matrice : ' + (selectedRole()?.name || 'Sélection')"
      [description]="(selectedRole()?.rawData?.description || 'Définition des permissions granulaires pour ce profil.')"
      [icon]="Shield"
      density="compact"
    >
      <!-- Indicateur de chargement / sauvegarde -->
      <fw-page-progress *ngIf="isLoading() || isSaving()"></fw-page-progress>

      <div actions class="actions-zone">
        <!-- Quick Filter -->
        <div class="relative group min-w-[240px]">
          <lucide-icon [name]="Search" [size]="14" class="absolute left-3 top-1/2 -translate-y-1/2 text-text-tertiary group-focus-within:text-primary transition-colors"></lucide-icon>
          <input type="text" 
                 [ngModel]="permissionQuery()"
                 (ngModelChange)="permissionQuery.set($event)"
                 placeholder="Filtrer les droits..." 
                 class="search-input-technical">
        </div>

        <div class="divider-v"></div>

        <app-fw-button 
          variant="primary" 
          size="md" 
          [icon]="Save" 
          [loading]="isSaving()" 
          [disabled]="!hasUnsavedChanges()"
          (click)="savePermissions()"
        >
          Publier
        </app-fw-button>
      </div>

      <main class="editor-container custom-scrollbar">

        <!-- Matrice des permissions par groupes -->
        <div class="space-y-10 py-6">
          
          <div *ngFor="let group of filteredPermissionGroups()" class="permission-group-section">
            <header class="group-header">
              <div class="w-1.5 h-4 bg-midnight rounded-full"></div>
              <h3 class="group-title">{{ group.category }}</h3>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div *ngFor="let perm of group.permissions" 
                   class="permission-row-card"
                   [class.granted]="perm.granted"
                   (click)="onPermissionToggle(perm.id, !perm.granted)">
                
                <div class="perm-content">
                  <div class="perm-info">
                    <div class="flex items-baseline gap-2">
                      <span class="perm-label">{{ perm.label }}</span>
                      <code class="perm-tech-id">{{ perm.id }}</code>
                    </div>
                    <p class="perm-desc">{{ perm.description }}</p>
                  </div>

                  <div class="perm-action">
                    <button
                      role="switch"
                      class="toggle-switch sm"
                      [class.on]="perm.granted"
                      [attr.aria-checked]="perm.granted"
                      (click)="$event.stopPropagation(); onPermissionToggle(perm.id, !perm.granted)">
                      <div class="track">
                        <div class="thumb"></div>
                      </div>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Empty state si filtrage sans résultat -->
          <div *ngIf="filteredPermissionGroups().length === 0" class="py-24 text-center">
            <div class="w-20 h-20 bg-surface-sunken rounded-full flex items-center justify-center mx-auto mb-6 text-text-tertiary opacity-30">
              <lucide-icon [name]="Search" [size]="32"></lucide-icon>
            </div>
            <h4 class="text-lg font-bold text-midnight">Aucune correspondance</h4>
            <p class="text-sm text-text-tertiary mt-1">Ajustez vos termes de recherche pour trouver une permission.</p>
          </div>

        </div>

      </main>
    </app-fw-page-shell>
  </div>

</div>

<!-- Loader initial -->
<div *ngIf="isInitialLoading() && roles().length === 0" class="flex flex-col items-center justify-center h-screen gap-4">
  <div class="w-10 h-10 border-4 border-primary-alpha border-t-primary rounded-full animate-spin"></div>
  <span class="text-[10px] font-black uppercase tracking-widest text-text-tertiary animate-pulse">Initialisation de la matrice...</span>
</div>
