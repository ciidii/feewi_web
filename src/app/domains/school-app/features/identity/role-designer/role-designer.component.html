<div class="config-feature-root">

  <!-- SIDEBAR DES RÔLES (Fixe) -->
  <aside class="scope-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand-icon-alt">
        <lucide-icon [name]="ShieldCheck" [size]="14"></lucide-icon>
      </div>
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">Contrôle d'Accès</span>
        <span class="sidebar-brand-year">Gouvernance SaaS</span>
      </div>
    </div>

    <div class="nav-section-title">
      Profils Disponibles
      <span class="level-count">{{ roles().length }}</span>
    </div>

    <div class="levels-scroll custom-scrollbar">
      <div *ngIf="isInitialLoading()" class="space-y-1">
        <div *ngFor="let i of [1,2,3,4,5]" class="flex items-center gap-3 px-3 py-2">
          <fw-skeleton shape="rect" width="24px" height="24px" radius="6px"></fw-skeleton>
          <div class="flex-1 space-y-1.5">
            <fw-skeleton width="60%" height="8px"></fw-skeleton>
            <fw-skeleton width="40%" height="6px"></fw-skeleton>
          </div>
        </div>
      </div>

      <ng-container *ngIf="!isInitialLoading()">
        <button
          *ngFor="let role of roles()"
          class="scope-item"
          [class.active]="selectedRoleId() === role.id"
          (click)="selectRole(role.id)"
        >
          <div class="scope-icon">
            <lucide-icon [name]="role.icon" [size]="14"></lucide-icon>
          </div>
          <div class="scope-label-wrap">
            <span class="scope-name">{{ role.name }}</span>
            <span class="scope-sub">{{ role.memberCount }} membre(s)</span>
          </div>
          <div class="override-dot" *ngIf="selectedRoleId() === role.id && hasUnsavedChanges()"></div>
        </button>
      </ng-container>
    </div>
  </aside>

  <!-- CONTENU PILOTÉ (Viewport avec scrolling géré) -->
  <div class="config-viewport">
    <app-fw-page-shell
      [title]="isInitialLoading() ? 'Chargement...' : 'Matrice : ' + (selectedRole()?.name || 'Sélection')"
      [description]="isInitialLoading() ? 'Récupération de la configuration de sécurité...' : (selectedRole()?.rawData?.description || 'Définition des permissions granulaires pour ce profil.')"
      [icon]="Shield"
      density="compact"
    >
      <div actions class="flex items-center gap-3">
        <div class="relative w-64">
          <lucide-icon [name]="Search" [size]="14" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></lucide-icon>
          <input type="text"
                 [ngModel]="permissionQuery()"
                 (ngModelChange)="permissionQuery.set($event)"
                 placeholder="Filtrer les ressources..."
                 class="search-input-technical"
                 [disabled]="isInitialLoading()">
        </div>

        <div class="divider-v"></div>

        <app-fw-button variant="tertiary" size="sm" [icon]="Plus" (click)="openAddRoleForm()" [disabled]="isInitialLoading()">Nouveau rôle</app-fw-button>
        <app-fw-button *ngIf="selectedRole() && !selectedRole()?.rawData?.isSystemRole" variant="danger" size="sm" [icon]="Trash2" (click)="deleteRole()" [disabled]="isInitialLoading()">Supprimer</app-fw-button>
        <app-fw-button variant="primary" size="md" [icon]="Save" [loading]="isSaving()" [disabled]="!hasUnsavedChanges() || isInitialLoading()" (click)="savePermissions()">Publier</app-fw-button>
      </div>

      <!-- MATRICE : Contenu scrollable -->
      <div class="pbac-matrix-wrapper custom-scrollbar">
        <div class="pbac-matrix-container">

          <!-- SKELETON -->
          <div *ngIf="isInitialLoading()" class="space-y-10 py-4">
            <div *ngFor="let g of [1,2]" class="space-y-4">
              <fw-skeleton width="200px" height="12px" radius="4px"></fw-skeleton>
              <div class="resource-table"><fw-skeleton *ngFor="let r of [1,2,3]" width="100%" height="48px"></fw-skeleton></div>
            </div>
          </div>

          <!-- LISTE PBAC -->
          <div class="space-y-12" *ngIf="!isInitialLoading()">
            <div *ngFor="let group of filteredPermissionGroups()" class="domain-section">
              <header class="domain-header mb-4">
                <h3 class="domain-title">{{ group.domainName }}</h3>
              </header>

              <div class="resource-table">
                <div class="resource-row header">
                  <div class="res-info-col uppercase tracking-widest text-[9px] font-bold text-slate-400">Ressource</div>
                  <div class="res-actions-grid px-4 text-[9px] font-bold text-slate-400 uppercase tracking-widest text-center">
                    <span>Lecture</span>
                    <span>Modification</span>
                    <span>Suppression</span>
                    <span>Spécial</span>
                  </div>
                </div>

                <div *ngFor="let res of group.resources" class="resource-row">
                  <div class="res-info-col">
                    <div class="flex flex-col">
                      <span class="res-name">{{ res.resourceName }}</span>
                      <span class="res-code">{{ res.resourceCode }}</span>
                    </div>
                  </div>

                  <div class="res-actions-grid px-4 py-2">
                    <div class="flex justify-center">
                      <div *ngIf="res.read" class="toggle-wrap" (click)="onPermissionToggle(res.read.id, !res.read.granted)">
                        <button role="switch" class="fw-toggle-switch sm variant-secondary" [class.on]="res.read.granted"><div class="track"><div class="thumb"></div></div></button>
                      </div>
                      <div *ngIf="!res.read" class="dot-spacer"></div>
                    </div>

                    <div class="flex justify-center">
                      <div *ngIf="res.write" class="toggle-wrap" (click)="onPermissionToggle(res.write.id, !res.write.granted)">
                        <button role="switch" class="fw-toggle-switch sm variant-primary" [class.on]="res.write.granted"><div class="track"><div class="thumb"></div></div></button>
                      </div>
                      <div *ngIf="!res.write" class="dot-spacer"></div>
                    </div>

                    <div class="flex justify-center">
                      <div *ngIf="res.delete" class="toggle-wrap" (click)="onPermissionToggle(res.delete.id, !res.delete.granted)">
                        <button role="switch" class="fw-toggle-switch sm variant-danger" [class.on]="res.delete.granted"><div class="track"><div class="thumb"></div></div></button>
                      </div>
                      <div *ngIf="!res.delete" class="dot-spacer"></div>
                    </div>

                    <div class="flex justify-center">
                      <div *ngIf="res.special" class="toggle-wrap" (click)="onPermissionToggle(res.special.id, !res.special.granted)">
                      </div>
                      <div *ngIf="!res.special" class="dot-spacer"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div *ngIf="filteredPermissionGroups().length === 0" class="py-24 text-center">
              <lucide-icon [name]="Search" [size]="32" class="text-slate-200 mx-auto mb-4"></lucide-icon>
              <p class="text-sm font-bold text-slate-400">Aucun droit trouvé pour cette recherche.</p>
            </div>
          </div>

        </div>
      </div>
    </app-fw-page-shell>
  </div>
</div>
