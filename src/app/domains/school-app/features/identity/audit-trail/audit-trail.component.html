<div class="space-y-8 animate-in fade-in duration-500">
  <!-- Page Header -->
  <header class="flex justify-between items-end">
    <div class="space-y-1">
      <h1 class="text-3xl font-display font-bold text-midnight tracking-tight">Journal d'Audit</h1>
      <p class="text-sm text-slate-medium font-medium">Historique complet des actions administratives et de sécurité de l'établissement.</p>
    </div>

    <div class="flex gap-3">
      <button class="flex items-center gap-2 px-5 py-2.5 bg-white border border-border-subtle rounded-xl text-[13px] font-bold text-slate-medium hover:bg-ice transition-all active:scale-95">
        <lucide-icon [name]="History" class="w-4 h-4"></lucide-icon>
        Actualiser le flux
      </button>
    </div>
  </header>

  <!-- Table Component -->
  <app-data-list
    [data]="auditLogs()"
    [tabs]="auditTabs"
    [activeTab]="activeTab()"
    [total]="totalLogs()"
    (onTabChange)="onTabChange($event)"
  ></app-data-list>
</div>
