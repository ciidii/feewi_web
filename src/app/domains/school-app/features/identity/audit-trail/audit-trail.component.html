<app-fw-page-shell
  title="Journal d'Audit"
  description="Historique complet des actions administratives et de sécurité."
  [icon]="HistoryIcon"
  density="compact"
>

  <div class="list-page-content animate-in fade-in duration-500">
    
    <!-- BARRE DE COMMANDE UNIFIÉE -->
    <app-fw-list-command-bar
      [searchQuery]="searchQuery()"
      [searchPlaceholder]="'Filtrer par acteur ou action...'"
      [totalElements]="totalLogs()"
      [activeFilters]="activeFilterChips()"
      (searchChange)="searchQuery.set($event)"
      (clearSearch)="searchQuery.set('')"
    >
      <!-- ACTIONS PRIMAIRES -->
      <div primary-actions class="flex items-center gap-2">
        <app-fw-button variant="tertiary" size="sm" [icon]="Download" title="Exporter les logs"></app-fw-button>
        <app-fw-button variant="tertiary" size="sm" [icon]="RefreshCw" [loading]="isLoading()" (click)="loadLogs()" title="Actualiser"></app-fw-button>
      </div>
    </app-fw-list-command-bar>

    <!-- LISTE DES ÉVÉNEMENTS -->
    <div class="list-container-integrated">
      <app-data-list
        [data]="auditLogs()"
        [tabs]="auditTabs"
        [activeTab]="activeTab()"
        [total]="totalLogs()"
        [actions]="[]"
        [isLoading]="isLoading()"
        [showSearch]="false"
        [showFilterButton]="false"
        [cardMode]="false"
        defaultView="table"
        (onTabChange)="onTabChange($event)"
        (onAction)="handleAction($event)"
      ></app-data-list>
    </div>

  </div>

</app-fw-page-shell>
