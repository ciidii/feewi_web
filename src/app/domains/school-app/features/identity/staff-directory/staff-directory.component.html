<app-fw-page-shell
  title="Annuaire du Personnel"
  description="Gérez les comptes, les rôles et les permissions des collaborateurs."
  [icon]="Users"
  [tabs]="staffTabs()"
  [activeTabId]="activeTabId()"
  (tabChange)="onTabChange($event)"
  density="compact"
>

  <div class="list-page-content animate-in fade-in duration-500">
    
    <!-- BARRE DE COMMANDE UNIFIÉE -->
    <app-fw-list-command-bar
      [searchQuery]="searchQuery()"
      [searchPlaceholder]="'Rechercher un membre...'"
      [totalElements]="totalStaff()"
      [activeFilters]="activeFilterChips()"
      (searchChange)="onSearch($event)"
      (clearSearch)="onSearch('')"
      (removeFilter)="removeFilter($event)"
      (clearAllFilters)="clearAllFilters()"
    >
      <!-- ACTIONS PRIMAIRES -->
      <div primary-actions class="flex items-center gap-2">
        <app-fw-button variant="tertiary" size="sm" [icon]="Download" title="Exporter"></app-fw-button>
        <app-fw-button variant="tertiary" size="sm" [icon]="RefreshCw" [loading]="isLoading()" (click)="loadStaff(searchQuery())" title="Actualiser"></app-fw-button>
        <div class="divider-v"></div>
        <app-fw-button 
          (click)="openAddStaffForm()"
          variant="primary"
          size="sm"
          [icon]="UserPlus"
        >
          Ajouter un membre
        </app-fw-button>
      </div>
    </app-fw-list-command-bar>

    <!-- LISTE DU PERSONNEL -->
    <div class="list-container-integrated">
      <app-data-list
        [data]="staffMembers()"
        [total]="totalStaff()"
        [actions]="staffActions"
        [isLoading]="isLoading()"
        [showSearch]="false"
        [showFilterButton]="false"
        [cardMode]="false"
        defaultView="cards"
        (onAction)="handleAction($event)"
      ></app-data-list>
    </div>

  </div>

</app-fw-page-shell>
