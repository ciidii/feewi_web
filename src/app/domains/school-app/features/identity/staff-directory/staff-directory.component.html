<div class="space-y-8 animate-in fade-in duration-500">
  <!-- Page Header -->
  <header class="flex justify-between items-end">
    <div class="space-y-1">
      <h1 class="text-3xl font-display font-bold text-midnight tracking-tight">Annuaire du Personnel</h1>
      <p class="text-sm text-slate-medium font-medium">Gérez les comptes, les rôles et les permissions des collaborateurs.</p>
    </div>

    <div class="flex gap-3">
      <button 
        (click)="openAddStaffForm()"
        class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-xl text-[13px] font-bold hover:bg-primary-hover transition-all shadow-lg shadow-primary/20 active:scale-95"
      >
        <lucide-icon [name]="UserPlus" class="w-4 h-4"></lucide-icon>
        Ajouter un membre
      </button>
    </div>
  </header>

  <!-- Table Component -->
  <div class="relative">
    <div *ngIf="isLoading()" class="absolute inset-0 z-10 bg-white/50 backdrop-blur-[1px] flex items-center justify-center rounded-2xl">
      <div class="flex flex-col items-center gap-3">
        <div class="w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        <span class="text-xs font-bold text-primary animate-pulse uppercase tracking-widest">Chargement...</span>
      </div>
    </div>

    <app-data-list
      [data]="staffMembers()"
      [tabs]="staffTabs"
      [activeTab]="activeTab()"
      [total]="totalStaff()"
      (onTabChange)="onTabChange($event)"
      (onSearch)="onSearch($event)"
    ></app-data-list>
  </div>
</div>
