<app-fw-form-shell
  title="Ajouter un membre"
  subtitle="Initialisation du compte collaborateur."
  [icon]="UserPlus"
  saveLabel="Créer le profil"
  [isLoading]="isLoading()"
  [canSave]="staffForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="staffForm" class="space-y-10 py-2">
    
    <!-- 1. Identification -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="User" [size]="14"></lucide-icon>
        <span class="label">Identité</span>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Prénom</label>
          <div class="fw-input-wrapper">
            <input 
              type="text" 
              formControlName="firstName" 
              placeholder="Ex: Jean" 
              class="fw-input"
              [class.error]="isInvalid('firstName')"
            />
          </div>
        </div>

        <div class="fw-field">
          <label class="fw-label">Nom</label>
          <div class="fw-input-wrapper">
            <input 
              type="text" 
              formControlName="lastName" 
              placeholder="Ex: Dupont" 
              class="fw-input"
              [class.error]="isInvalid('lastName')"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- 2. Contact -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Mail" [size]="14"></lucide-icon>
        <span class="label">Coordonnées</span>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Email Professionnel</label>
          <div class="fw-input-wrapper">
            <input 
              type="email" 
              formControlName="email" 
              placeholder="jean.dupont@ecole.sn" 
              class="fw-input"
              [class.error]="isInvalid('email')"
            />
          </div>
        </div>

        <div class="fw-field">
          <label class="fw-label">Téléphone</label>
          <div class="fw-input-wrapper">
            <input 
              type="tel" 
              formControlName="phone" 
              placeholder="+221 ..." 
              class="fw-input"
              [class.error]="isInvalid('phone')"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- 3. Droits & Catégorie -->
    <div class="space-y-6">
      <header class="section-header">
        <lucide-icon [name]="Shield" [size]="14"></lucide-icon>
        <span class="label">Droits & Accès</span>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="fw-field">
          <label class="fw-label">Type de compte</label>
          <div class="fw-input-wrapper">
            <mat-select formControlName="userTypeCode" class="fw-input" [class.error]="isInvalid('userTypeCode')">
              <mat-option *ngFor="let type of userTypes()" [value]="type.code">{{ type.name }}</mat-option>
            </mat-select>
          </div>
        </div>

        <div class="fw-field">
          <label class="fw-label">Rôles assignés</label>
          <div class="fw-input-wrapper">
            <mat-select formControlName="roles" multiple class="fw-input" [class.error]="isInvalid('roles')">
              <mat-select-trigger>
                <span class="text-xs font-bold text-midnight">{{ getSelectedRolesDisplay() }}</span>
              </mat-select-trigger>
              <mat-option *ngFor="let role of roles()" [value]="role.name">
                <div class="flex flex-col py-1">
                  <span class="text-xs font-bold">{{ formatRoleName(role.name) }}</span>
                  <span class="text-[10px] text-text-tertiary leading-none">{{ role.description }}</span>
                </div>
              </mat-option>
            </mat-select>
          </div>
        </div>
      </div>
    </div>

    <!-- Security Note -->
    <div class="p-4 bg-surface-sunken rounded-xl border border-border flex items-start gap-3">
      <lucide-icon [name]="Sparkles" [size]="16" class="text-primary mt-0.5"></lucide-icon>
      <p class="text-[11px] text-text-secondary leading-relaxed font-medium">
        Un email de bienvenue sera envoyé à l'utilisateur avec ses <span class="text-midnight font-bold">identifiants temporaires</span>.
      </p>
    </div>

  </form>
</app-fw-form-shell>
