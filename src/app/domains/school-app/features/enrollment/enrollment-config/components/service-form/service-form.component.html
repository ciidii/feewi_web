<div class="dialog-shell">
  <header class="dialog-header">
    <div class="dialog-title">
      <div class="icon-badge"><lucide-icon [name]="Plus" [size]="16"></lucide-icon></div>
      <h2>Nouveau service parascolaire</h2>
    </div>
    <button class="btn-close" (click)="cancel()"><lucide-icon [name]="X" [size]="18"></lucide-icon></button>
  </header>

  <div class="dialog-body">

    <div class="field-group">
      <label>Nom du service <span class="required">*</span></label>
      <input type="text" [ngModel]="label()" (ngModelChange)="label.set($event)"
             placeholder="Ex : Cantine scolaire" class="field-input" autofocus>
      <div class="code-preview" *ngIf="label()">
        <span class="code-label">Code généré :</span>
        <code>{{ previewCode() }}</code>
      </div>
    </div>

    <div class="field-group">
      <label>Options disponibles <span class="hint">(laisser vide si service sans choix)</span></label>
      <div class="option-input-row">
        <input type="text" [(ngModel)]="optionInput" placeholder="Ex : DEMI_PENSION"
               class="field-input" (keyup.enter)="addOption()">
        <button class="btn-add-opt" (click)="addOption()" [disabled]="!optionInput.trim()">
          <lucide-icon [name]="Plus" [size]="14"></lucide-icon>
        </button>
      </div>
      <div class="options-chips" *ngIf="options().length > 0">
        <div *ngFor="let opt of options()" class="opt-chip">
          <span>{{ opt }}</span>
          <button (click)="removeOption(opt)"><lucide-icon [name]="X" [size]="10"></lucide-icon></button>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label>Souscription obligatoire</label>
      <label class="toggle-row">
        <button type="button" class="fw-toggle-switch sm" [class.on]="mandatory()" (click)="mandatory.set(!mandatory())">
          <div class="track"><div class="thumb"></div></div>
        </button>
        <span>{{ mandatory() ? 'Oui — tous les élèves doivent souscrire' : 'Non — optionnel pour les familles' }}</span>
      </label>
    </div>

  </div>

  <footer class="dialog-footer">
    <button class="btn-cancel" (click)="cancel()">Annuler</button>
    <button class="btn-submit" (click)="submit()" [disabled]="!isValid()">
      <lucide-icon [name]="Plus" [size]="15"></lucide-icon>
      Ajouter le service
    </button>
  </footer>
</div>
