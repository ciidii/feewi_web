<app-fw-form-shell
  title="Ajouter un Document"
  subtitle="Définissez un nouveau type de pièce jointe exigé pour le dossier."
  [icon]="FileText"
  saveLabel="Ajouter à la liste"
  cancelLabel="Annuler"
  [canSave]="docForm.valid"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <form [formGroup]="docForm" class="space-y-6">
    
    <!-- Nom du Document -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Nom complet du document</label>
      <div class="relative group">
        <div class="absolute left-0 top-0 bottom-0 w-12 flex items-center justify-center text-slate-400 group-focus-within:text-primary transition-colors">
          <lucide-icon [name]="Type" class="w-4.5 h-4.5"></lucide-icon>
        </div>
        <input 
          type="text" 
          formControlName="name" 
          placeholder="Ex: Certificat de scolarité" 
          class="fw-input"
          [class.error]="isInvalid('name')"
        />
      </div>
      <p class="text-[10px] text-slate-400 font-medium ml-1 italic">Le système générera automatiquement un identifiant technique.</p>
    </div>

    <!-- Option Obligatoire -->
    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <lucide-icon [name]="Info" class="w-4 h-4 text-slate-400"></lucide-icon>
        <span class="text-sm font-semibold text-slate-700">Rendre ce document obligatoire</span>
      </div>
      <button
        type="button"
        class="fw-toggle-switch sm"
        [class.on]="docForm.get('mandatory')?.value"
        (click)="docForm.get('mandatory')?.setValue(!docForm.get('mandatory')?.value)"
      >
        <div class="track"><div class="thumb"></div></div>
      </button>
    </div>

  </form>
</app-fw-form-shell>
