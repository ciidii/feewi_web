<div class="relative p-8 max-w-lg bg-white rounded-[28px] shadow-2xl animate-in zoom-in-95 duration-300">
  
  <!-- Close Button -->
  <button 
    (click)="close()"
    class="absolute top-6 right-6 p-2 rounded-full hover:bg-ice text-slate-medium transition-colors"
  >
    <lucide-icon [name]="X" class="w-5 h-5"></lucide-icon>
  </button>

  <!-- Header -->
  <div class="flex items-center gap-4 mb-8">
    <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-600">
      <lucide-icon [name]="School" class="w-6 h-6"></lucide-icon>
    </div>
    <div>
      <h2 class="text-xl font-display font-bold text-midnight tracking-tight">Nouvel Établissement</h2>
      <p class="text-xs text-slate-medium font-medium uppercase tracking-wider">Configuration du Tenant SaaS</p>
    </div>
  </div>

  <!-- Form -->
  <form [formGroup]="tenantForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <!-- School Name -->
    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-slate-medium uppercase tracking-widest ml-1">Nom de l'établissement</label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none group-focus-within:text-primary transition-colors text-slate-medium">
          <lucide-icon [name]="School" class="w-4.5 h-4.5"></lucide-icon>
        </div>
        <input 
          type="text" 
          formControlName="name"
          placeholder="ex: Lycée Excellence"
          class="w-full bg-ice/40 border border-border-subtle rounded-xl py-3 pl-10 pr-4 text-sm font-semibold outline-none focus:ring-4 focus:ring-primary/5 focus:border-primary focus:bg-white transition-all"
        />
      </div>
    </div>

    <!-- Subdomain -->
    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-slate-medium uppercase tracking-widest ml-1">Sous-domaine Feewi</label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none group-focus-within:text-primary transition-colors text-slate-medium">
          <lucide-icon [name]="Globe" class="w-4.5 h-4.5"></lucide-icon>
        </div>
        <input 
          type="text" 
          formControlName="subdomain"
          placeholder="lycee-excellence"
          class="w-full bg-ice/40 border border-border-subtle rounded-xl py-3 pl-10 pr-24 text-sm font-semibold outline-none focus:ring-4 focus:ring-primary/5 focus:border-primary focus:bg-white transition-all"
        />
        <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
          <span class="text-xs font-bold text-slate-medium/50 uppercase">.feewi.io</span>
        </div>
      </div>
    </div>

    <!-- Admin Email -->
    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-slate-medium uppercase tracking-widest ml-1">Email Administrateur</label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none group-focus-within:text-primary transition-colors text-slate-medium">
          <lucide-icon [name]="Mail" class="w-4.5 h-4.5"></lucide-icon>
        </div>
        <input 
          type="email" 
          formControlName="adminEmail"
          placeholder="directeur&#64;ecole.com"
          class="w-full bg-ice/40 border border-border-subtle rounded-xl py-3 pl-10 pr-4 text-sm font-semibold outline-none focus:ring-4 focus:ring-primary/5 focus:border-primary focus:bg-white transition-all"
        />
      </div>
    </div>

    <!-- License Type -->
    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-slate-medium uppercase tracking-widest ml-1">Type de Licence</label>
      <div class="grid grid-cols-3 gap-3">
        <button 
          type="button"
          *ngFor="let type of licenses"
          (click)="tenantForm.get('licenseType')?.setValue(type.id)"
          [class.border-primary]="tenantForm.get('licenseType')?.value === type.id"
          [class.bg-primary/5]="tenantForm.get('licenseType')?.value === type.id"
          class="flex flex-col items-center gap-2 p-3 border border-border-subtle rounded-2xl hover:bg-ice transition-all text-center"
        >
          <lucide-icon [name]="ShieldCheck" class="w-5 h-5" [class.text-primary]="tenantForm.get('licenseType')?.value === type.id"></lucide-icon>
          <span class="text-[10px] font-bold uppercase tracking-tight">{{ type.label }}</span>
        </button>
      </div>
    </div>

    <!-- Submit Actions -->
    <div class="flex gap-3 pt-4">
      <button 
        type="button" 
        (click)="close()"
        class="flex-1 px-6 py-3.5 bg-ice text-slate-medium rounded-xl text-sm font-bold hover:bg-slate-200 transition-all active:scale-95"
      >
        Annuler
      </button>
      <button 
        type="submit" 
        [disabled]="tenantForm.invalid || isLoading()"
        class="flex-[2] bg-primary hover:bg-primary-hover disabled:bg-slate-200 text-white rounded-xl py-3.5 text-sm font-bold shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-95 transition-all flex items-center justify-center gap-2"
      >
        <lucide-icon *ngIf="isLoading()" [name]="Loader2" class="w-4.5 h-4.5 animate-spin"></lucide-icon>
        <span *ngIf="!isLoading()">Créer l'établissement</span>
      </button>
    </div>
  </form>
</div>
